// ── Panel de Sesiones del Paciente ───────────────────────
function PatientSessionsPanel({ user, patientId, patientName, role }) {
  const [sessions, setSessions] = useState([])
  const [loading, setLoading] = useState(true)
  const [modal, setModal] = useState(null)
  const [selected, setSelected] = useState(null)
  const [busy, setBusy] = useState(false)
  const [err, setErr] = useState('')

  const load = async () => {
    setLoading(true)
    const { data } = await sb.from('sessions').select('*').eq('patient_id', patientId).eq('user_id', user.id).order('session_date', { ascending: false })
    setSessions(data || [])
    setLoading(false)
  }
  useEffect(() => { load() }, [patientId])

  const save = async (form) => {
    setBusy(true); setErr('')
    const payload = {
      user_id: user.id, patient_id: patientId,
      session_number: form.session_number ? parseInt(form.session_number) : null,
      session_date: form.session_date || null, session_type: form.session_type || 'individual',
      content: form.content || null, interventions: form.interventions || null,
      patient_response: form.patient_response || null, homework: form.homework || null,
      next_session_goals: form.next_session_goals || null,
      mood_start: form.mood_start ? parseInt(form.mood_start) : null,
      mood_end: form.mood_end ? parseInt(form.mood_end) : null,
      status: form.status || 'realizada'
    }
    let error
    if (modal === 'edit') {
      ;({ error } = await sb.from('sessions').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', selected.id))
    } else {
      ;({ error } = await sb.from('sessions').insert(payload))
    }
    if (error) { setErr('Error al guardar.'); setBusy(false); return }
    setModal(null); setSelected(null); load()
    setBusy(false)
  }
  const destroy = async () => {
    await sb.from('sessions').delete().eq('id', selected.id)
    setModal(null); setSelected(null); load()
  }

  const SCOL = { realizada:'bg-green-100 text-green-700', pendiente:'bg-yellow-100 text-yellow-700', cancelada:'bg-red-100 text-red-700', reprogramada:'bg-blue-100 text-blue-700' }
  const SLBL = { realizada:'Realizada', pendiente:'Pendiente', cancelada:'Cancelada', reprogramada:'Reprogramada' }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <p className="text-sm font-semibold text-slate-700">{sessions.length} sesión{sessions.length !== 1 ? 'es' : ''} registrada{sessions.length !== 1 ? 's' : ''}</p>
        <button onClick={() => { setSelected(null); setErr(''); setModal('create') }}
          className="bg-brand-500 hover:bg-brand-600 text-white text-xs font-medium px-3 py-2 rounded-lg flex items-center gap-1.5 transition-colors">
          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Nueva sesión
        </button>
      </div>
      {loading ? <div className="text-center py-8 text-slate-400 text-sm">Cargando...</div>
      : sessions.length === 0 ? (
        <div className="text-center py-10 text-slate-400 text-sm bg-slate-50 rounded-xl border border-slate-200">
          <p className="text-2xl mb-2">📋</p>
          <p>Sin sesiones registradas</p>
          <p className="text-xs mt-1">Registra la primera sesión con el botón de arriba</p>
        </div>
      ) : (
        <div className="space-y-3">
          {sessions.map(s => (
            <div key={s.id} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
              <div className="flex items-start justify-between mb-2">
                <div>
                  <span className="font-semibold text-slate-800 text-sm">Sesión #{s.session_number || '—'}</span>
                  <span className="text-slate-400 text-xs ml-2">{s.session_date ? new Date(s.session_date+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</span>
                </div>
                <div className="flex items-center gap-2">
                  {s.mood_start && s.mood_end && (
                    <span className={`text-xs font-medium ${s.mood_end > s.mood_start ? 'text-green-600' : s.mood_end < s.mood_start ? 'text-red-500' : 'text-slate-500'}`}>
                      {s.mood_start}→{s.mood_end} {s.mood_end > s.mood_start ? '↑' : s.mood_end < s.mood_start ? '↓' : '→'}
                    </span>
                  )}
                  <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${SCOL[s.status] || SCOL.realizada}`}>{SLBL[s.status] || 'Realizada'}</span>
                </div>
              </div>
              {s.content && <p className="text-xs text-slate-600 mb-2 line-clamp-2">{s.content}</p>}
              {s.homework && <p className="text-xs text-slate-500"><span className="font-medium">Tarea:</span> {s.homework}</p>}
              <div className="flex gap-2 mt-3">
                <button onClick={() => { setSelected(s); setModal('view') }} className="text-xs text-brand-500 hover:text-brand-700 font-medium px-2 py-1 rounded hover:bg-brand-50">Ver detalle</button>
                <button onClick={() => { setSelected(s); setErr(''); setModal('edit') }} className="text-xs text-slate-500 hover:text-slate-700 font-medium px-2 py-1 rounded hover:bg-slate-100">Editar</button>
                <button onClick={() => { setSelected(s); setModal('delete') }} className="text-xs text-red-500 hover:text-red-700 font-medium px-2 py-1 rounded hover:bg-red-50">Eliminar</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {(modal === 'create' || modal === 'edit') && (
        <Modal title={modal === 'edit' ? 'Editar sesión' : 'Nueva sesión'} onClose={() => setModal(null)} wide>
          <SessionForm initial={modal === 'edit' ? selected : { ...EMPTY_SESSION, patient_id: patientId }} patients={[]} onSave={save} onClose={() => setModal(null)} busy={busy} err={err} hidePatientSelect={true} />
        </Modal>
      )}
      {modal === 'view' && selected && (
        <Modal title="Detalle de sesión" onClose={() => setModal(null)} wide>
          <SessionDetail session={selected} patientName={patientName} onEdit={() => setModal('edit')} onClose={() => setModal(null)} />
        </Modal>
      )}
      {modal === 'delete' && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-sm p-6 text-center shadow-2xl fade-in">
            <p className="text-lg font-semibold text-slate-800 mb-2">¿Eliminar sesión?</p>
            <p className="text-slate-500 text-sm mb-5">Esta acción no se puede deshacer.</p>
            <div className="flex gap-3">
              <button onClick={() => setModal(null)} className="flex-1 px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
              <button onClick={destroy} className="flex-1 px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-medium">Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

// ── Panel de Riesgo Suicida del Paciente ──────────────────
function SuicideRiskPanel({ user, patientId, patientName }) {
  const [scores, setScores] = useState({})
  const [notes, setNotes] = useState('')
  const [assessments, setAssessments] = useState([])
  const [loading, setLoading] = useState(true)
  const [saving, setSaving] = useState(false)
  const [showResult, setShowResult] = useState(false)

  const load = async () => {
    setLoading(true)
    const { data } = await sb.from('suicide_risk_assessments').select('*').eq('patient_id', patientId).eq('user_id', user.id).order('created_at', { ascending: false })
    setAssessments(data || [])
    setLoading(false)
  }
  useEffect(() => { load() }, [patientId])

  const totalScore = Object.values(scores).reduce((s, v) => s + (v || 0), 0)
  const maxScore = SUICIDE_RISK_QUESTIONS.length * 4
  const allAnswered = Object.keys(scores).length === SUICIDE_RISK_QUESTIONS.length
  const getRiskLevel = (score) => {
    if (score <= 4) return SUICIDE_RISK_LEVELS[0]
    if (score <= 9) return SUICIDE_RISK_LEVELS[1]
    if (score <= 14) return SUICIDE_RISK_LEVELS[2]
    return SUICIDE_RISK_LEVELS[3]
  }
  const riskData = getRiskLevel(totalScore)
  const formatDate = d => d ? new Date(d).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'

  const saveAssessment = async () => {
    if (!allAnswered) return
    setSaving(true)
    await sb.from('suicide_risk_assessments').insert({
      user_id: user.id, patient_id: patientId,
      scores, total_score: totalScore,
      risk_level: riskData.level, notes: notes || null
    })
    setScores({}); setNotes(''); setShowResult(false)
    load(); setSaving(false)
  }

  const printAssessment = (a, historic) => {
    const useScores = historic ? a.scores : scores
    const useTotal = historic ? a.total_score : totalScore
    const useRisk = getRiskLevel(useTotal)
    const interventions = INTERVENTIONS[useRisk.level] || []
    const now = new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})
    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Evaluación Riesgo</title>
    <style>@page{margin:12mm 14mm}body{font-family:Arial,sans-serif;font-size:10px;color:#1e293b;line-height:1.4}
    h1{color:#1a2460;font-size:18px}h2{color:#1a2460;font-size:15px;margin-top:20px;border-bottom:1px solid #e2e8f0;padding-bottom:4px}
    .badge{display:inline-block;padding:4px 14px;border-radius:50px;font-weight:700;font-size:14px}
    .section{background:#f8fafc;border-radius:8px;padding:12px;margin:10px 0}
    ul{margin:8px 0 0 20px}li{margin-bottom:6px}
    .footer{margin-top:30px;border-top:1px solid #e2e8f0;padding-top:10px;font-size:10px;color:#94a3b8;text-align:center}
    @media print{body{padding:8px}}</style></head><body>
    <h1>Evaluación de Riesgo Suicida</h1>
    <p style="color:#64748b;font-size:12px">Paciente: <strong>${patientName}</strong> · Fecha: ${historic ? formatDate(a.created_at) : now}</p>
    <div style="margin:16px 0">
      <p style="font-size:12px;color:#64748b">Puntaje total: ${useTotal}/${maxScore}</p>
      <div class="badge" style="background:${useRisk.level==='Bajo'?'#dcfce7':useRisk.level==='Moderado'?'#fef3c7':useRisk.level==='Alto'?'#ffedd5':'#fee2e2'};color:${useRisk.level==='Bajo'?'#166534':useRisk.level==='Moderado'?'#92400e':useRisk.level==='Alto'?'#9a3412':'#991b1b'}">Riesgo ${useRisk.level}</div>
    </div>
    <h2>Evaluación por dimensiones</h2>
    ${SUICIDE_RISK_QUESTIONS.map(q => {
      const s = (useScores||{})[q.id] || 0
      const opt = q.options.find(o => o.score === s)
      return '<div class="section"><strong>' + q.label + '</strong> (' + s + '/4)<br/><span style="color:#475569">' + (opt ? opt.text : '—') + '</span></div>'
    }).join('')}
    <h2>Intervenciones recomendadas</h2>
    <ul>${interventions.map(i => '<li>' + i + '</li>').join('')}</ul>
    ${(historic ? a.notes : notes) ? '<h2>Notas clínicas</h2><div class="section">' + (historic ? a.notes : notes) + '</div>' : ''}
    <div class="footer">Psicoval · ${now} · Confidencial — uso clínico exclusivo<br/>⚠️ Herramienta de apoyo clínico. El criterio profesional prevalece sobre la puntuación.</div>
    </body></html>`
    const w = window.open('', '_blank')
    if (w) { w.document.write(html); w.document.close(); setTimeout(() => w.print(), 500) }
  }

  return (
    <div className="space-y-5">
      <div className="bg-red-50 border border-red-200 rounded-xl p-3 flex gap-2">
        <span className="text-red-500 flex-shrink-0">⚠️</span>
        <p className="text-xs text-red-700 leading-relaxed"><strong>Aviso clínico:</strong> Herramienta de apoyo estructurado. El criterio clínico siempre prevalece. En riesgo inminente, actúa de inmediato.</p>
      </div>

      {/* Formulario nueva evaluación */}
      <div className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <p className="font-semibold text-slate-700 text-sm mb-4">Nueva evaluación — {patientName}</p>
        <div className="space-y-3 mb-4">
          {SUICIDE_RISK_QUESTIONS.map(q => (
            <div key={q.id} className="border border-slate-200 rounded-xl p-3">
              <p className="text-sm font-semibold text-slate-700 mb-2">{q.label}</p>
              <div className="space-y-1.5">
                {q.options.map(opt => (
                  <label key={opt.score} className={`flex items-start gap-2 cursor-pointer p-2 rounded-lg transition-colors ${scores[q.id] === opt.score ? 'bg-brand-50 border border-brand-200' : 'hover:bg-slate-50'}`}>
                    <input type="radio" name={'panel_' + q.id} value={opt.score} checked={scores[q.id] === opt.score}
                      onChange={() => { setScores(s => ({...s, [q.id]: opt.score})); setShowResult(false) }}
                      className="mt-0.5 flex-shrink-0 accent-brand-500"/>
                    <span className="text-xs text-slate-600 leading-relaxed">{opt.text}</span>
                  </label>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div className="mb-4">
          <label className="block text-sm font-medium text-slate-700 mb-1">Notas clínicas (opcional)</label>
          <textarea rows={2} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"
            placeholder="Observaciones adicionales..." value={notes} onChange={e => setNotes(e.target.value)} />
        </div>
        <div className="flex gap-2">
          <button onClick={() => setShowResult(true)} disabled={!allAnswered}
            className="flex-1 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium disabled:opacity-40 transition-colors">
            Ver resultado
          </button>
          {showResult && allAnswered && (
            <button onClick={() => printAssessment(null, false)}
              className="py-2.5 px-3 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm transition-colors">
              🖨️
            </button>
          )}
          {showResult && allAnswered && (
            <button onClick={saveAssessment} disabled={saving}
              className="flex-1 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium disabled:opacity-50 transition-colors">
              {saving ? 'Guardando...' : 'Guardar evaluación'}
            </button>
          )}
        </div>

        {showResult && allAnswered && (
          <div className={`mt-4 rounded-xl border p-4 ${riskData.bg} ${riskData.border}`}>
            <div className="flex items-center justify-between mb-2">
              <p className={`text-base font-bold ${riskData.color}`}>Riesgo {riskData.level}</p>
              <span className="text-sm font-semibold text-slate-600">{totalScore}/{maxScore} pts</span>
            </div>
            <div className="h-2.5 bg-white rounded-full overflow-hidden mb-3">
              <div className={`h-full rounded-full ${totalScore<=4?'bg-green-400':totalScore<=9?'bg-amber-400':totalScore<=14?'bg-orange-400':'bg-red-500'}`}
                style={{width: (totalScore/maxScore*100)+'%'}} />
            </div>
            <p className="text-xs font-semibold text-slate-600 mb-2 uppercase tracking-wider">Intervenciones recomendadas</p>
            <ul className="space-y-1">
              {(INTERVENTIONS[riskData.level]||[]).map((item,i) => (
                <li key={i} className="flex items-start gap-2 text-xs text-slate-700">
                  <span className="text-brand-500 font-bold flex-shrink-0">→</span>{item}
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>

      {/* Historial de evaluaciones */}
      <div className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <p className="font-semibold text-slate-700 text-sm mb-3">Historial de evaluaciones</p>
        {loading ? <p className="text-slate-400 text-sm text-center py-4">Cargando...</p>
        : assessments.length === 0 ? (
          <p className="text-slate-400 text-sm text-center py-4">Sin evaluaciones previas</p>
        ) : (
          <div className="space-y-2">
            {assessments.map(a => {
              const rd = getRiskLevel(a.total_score)
              return (
                <div key={a.id} className={`rounded-xl p-3 border ${rd.bg} ${rd.border} flex items-center justify-between`}>
                  <div>
                    <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${rd.badge}`}>Riesgo {a.risk_level}</span>
                    <p className="text-xs text-slate-500 mt-1">{formatDate(a.created_at)} · {a.total_score}/24 pts</p>
                    {a.notes && <p className="text-xs text-slate-600 mt-1">{a.notes}</p>}
                  </div>
                  <button onClick={() => printAssessment(a, true)} className="text-xs text-slate-500 hover:text-slate-700 px-2 py-1 rounded hover:bg-white/50">🖨️</button>
                </div>
              )
            })}
          </div>
        )}
      </div>

      {/* Recursos emergencia */}
      <div className="bg-slate-800 rounded-xl p-4">
        <p className="text-white font-semibold text-sm mb-2">📞 Emergencias</p>
        <div className="space-y-1.5">
          {[{label:'ECU-911',num:'911'},{label:'DINAPEN',num:'145'},{label:'Bomberos',num:'102'}].map(r => (
            <div key={r.label} className="flex justify-between">
              <span className="text-slate-300 text-xs">{r.label}</span>
              <span className="text-white font-bold text-sm">{r.num}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

// ── Panel de Instrumentos del Paciente ────────────────────
function PatientInstrumentsPanel({ user, patientId, patientName, role, planExpiry }) {
  const [results, setResults] = useState([])
  const [loading, setLoading] = useState(true)
  const [modal, setModal] = useState(null)
  const [selInstrument, setSelInstrument] = useState(null)
  const [busy, setBusy] = useState(false)

  const load = async () => {
    setLoading(true)
    const { data } = await sb.from('instrument_results').select('*').eq('patient_id', patientId).eq('user_id', user.id).order('applied_at', { ascending: false })
    setResults(data || [])
    setLoading(false)
  }
  useEffect(() => { load() }, [patientId])

  const effRole = effectiveRole(role, planExpiry)
  const availableInstruments = INSTRUMENTS.filter(ins => canUseInstrument(role, ins.key, planExpiry))

  const handleSaveInstrument = async (result) => {
    setBusy(true)
    await sb.from('instrument_results').insert({
      user_id: user.id, patient_id: patientId,
      instrument_key: result.key, instrument_name: result.name,
      scores: result.scores, total_score: result.total,
      interpretation: result.interpretation,
      subscales: result.subscales || null,
      applied_at: new Date().toISOString().split('T')[0]
    })
    setModal(null); setSelInstrument(null); load()
    setBusy(false)
  }

  // Group by instrument for pre-post comparison
  const byInstrument = results.reduce((acc, r) => {
    if (!acc[r.instrument_key]) acc[r.instrument_key] = []
    acc[r.instrument_key].push(r)
    return acc
  }, {})

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <p className="text-sm font-semibold text-slate-700">{results.length} aplicación{results.length !== 1 ? 'es' : ''} registrada{results.length !== 1 ? 's' : ''}</p>
        <button onClick={() => setModal('select')}
          className="bg-brand-500 hover:bg-brand-600 text-white text-xs font-medium px-3 py-2 rounded-lg flex items-center gap-1.5 transition-colors">
          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Aplicar instrumento
        </button>
      </div>

      {loading ? <div className="text-center py-8 text-slate-400 text-sm">Cargando...</div>
      : results.length === 0 ? (
        <div className="text-center py-10 text-slate-400 text-sm bg-slate-50 rounded-xl border border-slate-200">
          <p className="text-2xl mb-2">📊</p>
          <p>Sin instrumentos aplicados</p>
          <p className="text-xs mt-1">Aplica el primer instrumento con el botón de arriba</p>
        </div>
      ) : (
        <div className="space-y-4">
          {Object.entries(byInstrument).map(([key, apps]) => (
            <div key={key} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <p className="font-semibold text-slate-800 text-sm">{apps[0].instrument_name}</p>
                <span className="text-xs text-slate-400">{apps.length} aplicación{apps.length !== 1 ? 'es' : ''}</span>
              </div>
              {apps.length > 1 && (() => {
                const sorted = [...apps].reverse() // oldest first
                const ins = INSTRUMENTS[key]
                const maxS = ins?.maxScore || Math.max(...sorted.map(a=>a.total_score)) || 100
                const W=280, H=80, PAD=20
                const xs = sorted.map((_,i)=>PAD + i*(W-PAD*2)/(sorted.length-1))
                const ys = sorted.map(a=>H-PAD-(a.total_score/maxS)*(H-PAD*2))
                const pathD = xs.map((x,i)=>(i===0?'M':'L')+x+','+ys[i]).join(' ')
                const first = sorted[0].total_score, last = sorted[sorted.length-1].total_score
                const diff = last - first
                const trendColor = diff<0?'#22c55e':diff>0?'#ef4444':'#64748b'
                return (
                  <div className="bg-white border border-slate-200 rounded-xl p-3 mb-3">
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-xs font-semibold text-slate-600">Evolución ({sorted.length} aplicaciones)</p>
                      <span className="text-xs font-bold" style={{color:trendColor}}>
                        {diff<0?'↓ Bajó ':diff>0?'↑ Subió ':'→ Sin cambio'}{diff!==0?Math.abs(diff)+' pts':''}
                      </span>
                    </div>
                    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
                      {/* Grid lines */}
                      {[0,0.25,0.5,0.75,1].map(f=>{
                        const y=H-PAD-(f*(H-PAD*2))
                        return <line key={f} x1={PAD} y1={y} x2={W-PAD} y2={y} stroke="#e2e8f0" strokeWidth="1"/>
                      })}
                      {/* Area fill */}
                      <path d={pathD+` L${xs[xs.length-1]},${H-PAD} L${xs[0]},${H-PAD} Z`} fill={trendColor} fillOpacity="0.08"/>
                      {/* Line */}
                      <path d={pathD} fill="none" stroke={trendColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      {/* Points */}
                      {sorted.map((a,i)=>(
                        <g key={i}>
                          <circle cx={xs[i]} cy={ys[i]} r="4" fill={trendColor} stroke="white" strokeWidth="2"/>
                        </g>
                      ))}
                    </svg>
                    <div className="flex justify-between text-xs text-slate-400 mt-1">
                      {sorted.map((a,i)=>(
                        <span key={i} className="text-center">
                          <span className="block font-bold text-slate-700">{a.total_score}</span>
                          {new Date(a.applied_at+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short'})}
                        </span>
                      ))}
                    </div>
                  </div>
                )
              })()}
              <div className="space-y-2">
                {apps.map(r => (
                  <div key={r.id} className="bg-slate-50 rounded-lg p-3 border border-slate-100">
                    <div className="flex justify-between items-start">
                      <div>
                        <p className="text-xs text-slate-500">{new Date(r.applied_at+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})}</p>
                        <p className="text-sm font-semibold text-slate-800 mt-0.5">Puntaje: {r.total_score}</p>
                        <p className="text-xs text-slate-600 mt-1">{r.interpretation}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Modal selección instrumento */}
      {modal === 'select' && (
        <Modal title="Seleccionar instrumento" onClose={() => setModal(null)} wide>
          <div className="grid grid-cols-1 gap-2 max-h-96 overflow-y-auto">
            {availableInstruments.map(ins => (
              <button key={ins.key} onClick={() => { setSelInstrument(ins); setModal('apply') }}
                className="text-left p-3 border border-slate-200 rounded-xl hover:border-brand-400 hover:bg-brand-50 transition-colors">
                <p className="font-semibold text-slate-800 text-sm">{ins.name}</p>
                <p className="text-xs text-slate-500 mt-0.5">{ins.description}</p>
              </button>
            ))}
          </div>
        </Modal>
      )}

      {modal === 'apply' && selInstrument && (
        <Modal title={selInstrument.name} onClose={() => { setModal(null); setSelInstrument(null) }} wide>
          <InstrumentApply instrument={selInstrument} patient={{id: patientId, name: patientName}}
            onSave={handleSaveInstrument} onClose={() => { setModal(null); setSelInstrument(null) }} busy={busy} />
        </Modal>
      )}
    </div>
  )
}

function PatientInterviewPanel({ user, patientId, patientName }) {
  const [interviews, setInterviews] = useState([])
  const [loading, setLoading] = useState(true)
  const [modal, setModal] = useState(null)
  const [selected, setSelected] = useState(null)
  const [patients, setPatients] = useState([{id: patientId, name: patientName}])
  const [busy, setBusy] = useState(false)
  const [err, setErr] = useState('')

  const load = async () => {
    setLoading(true)
    const { data } = await sb.from('initial_interviews').select('*').eq('patient_id', patientId).eq('user_id', user.id).order('created_at', { ascending: false })
    setInterviews(data || [])
    setLoading(false)
  }
  useEffect(() => { load() }, [patientId])

  const save = async (form) => {
    setBusy(true); setErr('')
    const payload = {
      user_id: user.id, patient_id: patientId,
      risk_level: form.risk_level||null,
      consultation_reason: form.consultation_reason||null,
      problem_duration: form.problem_duration||null, problem_onset: form.problem_onset||null,
      problem_course: form.problem_course||null, problem_intensity: form.problem_intensity||5,
      problem_frequency: form.problem_frequency||null,
      areas_affected: form.areas_affected||[], previous_solutions: form.previous_solutions||[],
      previous_solutions_notes: form.previous_solutions_notes||null,
      sat_work: form.sat_work||5, sat_family: form.sat_family||5,
      sat_social: form.sat_social||5, sat_sleep: form.sat_sleep||5,
      physical_activity: form.physical_activity||null, eating_habits: form.eating_habits||null,
      support_network: form.support_network||[], context_notes: form.context_notes||null,
      previous_treatments: form.previous_treatments||null,
      previous_treatments_notes: form.previous_treatments_notes||null,
      medication_type: form.medication_type||[], medication_detail: form.medication_detail||null,
      significant_events: form.significant_events||[], significant_events_notes: form.significant_events_notes||null,
      medical_history: form.medical_history||[],
      substance_alcohol: form.substance_alcohol||'no_consume',
      substance_tobacco: form.substance_tobacco||'no_consume',
      substance_cannabis: form.substance_cannabis||'no_consume',
      substance_other: form.substance_other||'no_consume',
      mse_appearance: form.mse_appearance||'adecuada', mse_language: form.mse_language||'normal',
      mse_psychomotor: form.mse_psychomotor||'normal', mse_thought: form.mse_thought||'logico',
      mse_affect: form.mse_affect||'congruente', mse_reality: form.mse_reality||'conservado',
      mood_subjective: form.mood_subjective||null,
      symptoms_mood: form.symptoms_mood||[], symptoms_anxiety: form.symptoms_anxiety||[],
      symptoms_cognitive: form.symptoms_cognitive||[], symptoms_behavioral: form.symptoms_behavioral||[],
      diag_clinical: form.diag_clinical||[], diag_contextual: form.diag_contextual||[],
      diag_notes: form.diag_notes||null, global_severity: form.global_severity||null,
      problem_operationalized: form.problem_operationalized||null,
      maintaining_variables: form.maintaining_variables||[],
      predisposing_factors: form.predisposing_factors||null,
      protective_factors: form.protective_factors||[],
      patient_expectations: form.patient_expectations||null,
      motivation: form.motivation||7, insight: form.insight||null,
      session_frequency: form.session_frequency||'semanal',
      derivation: form.derivation||'no',
      instruments_confirmed: form.instruments_confirmed||[],
      evaluator_notes: form.evaluator_notes||null,
      session_course: form.session_course||'si',
      session_course_reasons: form.session_course_reasons||[],
      session_course_notes: form.session_course_notes||null,
      // New fields v4
      risk_has_plan: form.risk_has_plan||false,
      risk_has_means: form.risk_has_means||false,
      risk_immediate_intention: form.risk_immediate_intention||false,
      risk_support_available: form.risk_support_available||false,
      risk_can_stay_alone: form.risk_can_stay_alone!==undefined?form.risk_can_stay_alone:true,
      triggers: form.triggers||[],
      triggers_other: form.triggers_other||null,
      behaviors: form.behaviors||[],
      behaviors_notes: form.behaviors_notes||null,
      consequences: form.consequences||[],
      consequences_notes: form.consequences_notes||null,
      medical_detail: form.medical_detail||null,
      behavioral_objective: form.behavioral_objective||null,
      ai_summary: form.ai_summary||null,
      status: form.status||'borrador'
    }
    // Helper: attempt save, return {ok, error}
    const attemptSave = async (p) => {
      let res
      if (modal === 'edit') {
        res = await sb.from('initial_interviews').update({...p, updated_at: new Date().toISOString()}).eq('id', selected.id)
      } else {
        res = await sb.from('initial_interviews').insert(p)
      }
      return res
    }

    // Try 1: full payload
    let { error } = await attemptSave(payload)

    if (error) {
      console.error('Save error (full payload):', JSON.stringify(error))

      // Try 2: strip new columns that might not exist yet, keep original + v4 base
      const v4Payload = {
        user_id: payload.user_id,
        patient_id: payload.patient_id,
        status: payload.status||'borrador',
        evaluator_notes: payload.evaluator_notes||null,
        // Original columns (always exist)
        problem_description: payload.consultation_reason||null,
        problem_frequency: payload.problem_frequency||null,
        previous_solutions: Array.isArray(payload.previous_solutions) ? payload.previous_solutions.join(', ') : (payload.previous_solutions||null),
        evaluator_notes: payload.evaluator_notes||null,
      }
      let res2 = await attemptSave(v4Payload)
      console.error('Save error (v4 payload):', JSON.stringify(res2.error))

      // Try 3: absolute minimum - user_id, patient_id, status only
      if (res2.error) {
        let res3 = await attemptSave({
          user_id: payload.user_id,
          patient_id: payload.patient_id,
          status: 'borrador',
          evaluator_notes: (payload.evaluator_notes||'') + '\n[DATOS PENDIENTES DE MIGRACIÓN DB]',
          problem_description: payload.consultation_reason||null,
        })
        if (res3.error) {
          console.error('Save error (minimum):', JSON.stringify(res3.error))
          setErr('Error al guardar (código ' + (error.code||'400') + '): ' + (error.message||'columna no existe') + '. Ejecuta el SQL de migración completo en Supabase y recarga la página.')
        } else {
          setModal(null); setSelected(null); load()
          // Show warning that full data wasn't saved
          setTimeout(()=>alert('⚠️ Guardado parcial: algunos campos nuevos no pudieron guardarse porque faltan columnas en la base de datos. Ejecuta el SQL de migración en Supabase para guardar todos los datos.'), 100)
        }
      } else {
        setModal(null); setSelected(null); load()
        setTimeout(()=>alert('⚠️ Guardado con datos limitados. Ejecuta el SQL de migración completo para guardar todos los campos clínicos.'), 100)
      }
    } else {
      setModal(null); setSelected(null); load()
    }
    setBusy(false)
  }

  const STATUS_INT_COLORS = { borrador:'bg-slate-100 text-slate-600', completada:'bg-green-100 text-green-700' }
  const STATUS_INT_LABELS = { borrador:'Borrador', completada:'Completada' }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <p className="text-sm font-semibold text-slate-700">{interviews.length > 0 ? `${interviews.length} entrevista${interviews.length > 1 ? 's' : ''} registrada${interviews.length > 1 ? 's' : ''}` : 'Sin entrevistas registradas'}</p>
        <button onClick={() => { setSelected(null); setErr(''); setModal('create') }}
          className="bg-brand-500 hover:bg-brand-600 text-white text-xs font-medium px-3 py-2 rounded-lg flex items-center gap-1.5 transition-colors">
          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Nueva entrevista
        </button>
      </div>

      {loading ? <div className="text-center py-8 text-slate-400 text-sm">Cargando...</div>
      : interviews.length === 0 ? (
        <div className="text-center py-10 bg-slate-50 rounded-xl border border-slate-200 text-slate-400 text-sm">
          <p className="text-2xl mb-2">📝</p>
          <p>Sin entrevista registrada</p>
          <p className="text-xs mt-1">Después de la primera sesión, registra aquí la información recopilada</p>
        </div>
      ) : (
        <div className="space-y-3">
          {interviews.map(iv => (
            <div key={iv.id} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <span className="font-medium text-slate-800 text-sm">Entrevista inicial</span>
                <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${STATUS_INT_COLORS[iv.status]||STATUS_INT_COLORS.borrador}`}>{STATUS_INT_LABELS[iv.status]||'Borrador'}</span>
              </div>
              <p className="text-xs text-slate-400 mb-2">{new Date(iv.created_at).toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})}</p>
              {iv.problem_description && <p className="text-xs text-slate-600 line-clamp-2">{iv.problem_description}</p>}
              <div className="flex gap-2 mt-3">
                <button onClick={() => { setSelected(iv); setModal('view') }} className="text-xs text-brand-500 hover:text-brand-700 font-medium px-2 py-1 rounded hover:bg-brand-50">Ver detalle</button>
                <button onClick={() => { setSelected(iv); setErr(''); setModal('edit') }} className="text-xs text-slate-500 hover:text-slate-700 font-medium px-2 py-1 rounded hover:bg-slate-100">Editar</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {(modal === 'create' || modal === 'edit') && (
        <Modal title={modal === 'edit' ? 'Editar entrevista' : 'Nueva entrevista inicial'} onClose={() => { setModal(null); setSelected(null) }} wide>
          <InterviewForm initial={modal === 'edit' ? selected : null}
            patientId={patientId} patients={patients} onSave={save} onClose={() => { setModal(null); setSelected(null) }} busy={busy} err={err} />
        </Modal>
      )}
      {modal === 'view' && selected && (
        <Modal title="Entrevista inicial" onClose={() => { setModal(null); setSelected(null) }} wide>
          <InterviewDetail interview={selected} patientName={patientName} onEdit={() => setModal('edit')} onClose={() => { setModal(null); setSelected(null) }} />
        </Modal>
      )}
    </div>
  )
}

    if (w) { w.document.write(html); w.document.close(); setTimeout(() => w.print(), 500) }
  }

  const registerSigned = async () => {
    setSaving(true)
    await sb.from('informed_consents').insert({
      user_id: user.id, patient_id: patient.id,
      patient_name: patient.name, signed_date: signedDate, status: 'firmado'

  return (

            Generar e imprimir
          </button>
          <button onClick={() => setModal('register')}

      {loading ? <div className="text-center py-6 text-slate-400 text-sm">Cargando...</div>
      : consents.length === 0 ? (
        <div className="text-center py-8 bg-slate-50 rounded-xl border border-slate-200 text-slate-400 text-sm">
          <p className="text-2xl mb-2">📄</p>
          <p>Sin consentimiento registrado</p>

      ) : (
        <div className="space-y-2">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Historial</p>
          {consents.map(c => (
            <div key={c.id} className="bg-white border border-green-200 rounded-xl p-3 flex items-center justify-between">
              <div>
                <span className="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full">✓ Firmado</span>
                <p className="text-xs text-slate-500 mt-1">{c.signed_date ? new Date(c.signed_date+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'}) : '—'}</p>

            </div>

      {modal === 'register' && (

            <input type="date" className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-brand-500"
              value={signedDate} onChange={e => setSignedDate(e.target.value)} />
            <div className="flex gap-3">
              <button onClick={() => setModal(null)} className="flex-1 px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
              <button onClick={registerSigned} disabled={saving} className="flex-1 px-4 py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white text-sm font-medium disabled:opacity-50">

          </div>
        </div>

  )
}

            <option value="activo">Activo</option><option value="en_pausa">En pausa</option><option value="alta">Alta terapéutica</option><option value="derivado">Derivado</option><option value="cerrado">Cerrado</option>
          </Select>
        </div>
        <Textarea label="Notas clínicas" rows={3} placeholder="Observaciones libres..." value={form.notes} onChange={e=>f('notes',e.target.value)} />
      </div>}
      <div className="flex justify-between items-center pt-2">
        <div className="flex gap-1">{tabs.map(t=><div key={t.id} className={`w-2 h-2 rounded-full ${tab===t.id?'bg-brand-500':'bg-slate-200'}`}/>)}</div>
        <div className="flex gap-3">
          <button type="button" onClick={onClose} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
          <button type="submit" disabled={busy} className="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium disabled:opacity-50">{busy?'Guardando...':'Guardar cambios'}</button>
        </div>
      </div>
    </form>
  )
}

        <p className="text-sm font-semibold text-slate-700">Plan terapéutico</p>
        <div className="flex gap-2">
          <button onClick={()=>setEditing(true)} className="text-xs text-brand-500 hover:text-brand-700 font-medium px-3 py-1.5 rounded-lg hover:bg-brand-50">Editar</button>
          <button onClick={generatePlan} className="text-xs text-slate-500 hover:text-slate-700 font-medium px-3 py-1.5 rounded-lg hover:bg-slate-100">Regenerar</button>
          <button onClick={printPlan} className="text-xs text-green-600 hover:text-green-800 font-medium px-3 py-1.5 rounded-lg hover:bg-green-50 flex items-center gap-1">
            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            Imprimir
          </button>
        </div>
      </div>
      <div className="bg-purple-50 border border-purple-100 rounded-xl p-3">
        <p className="text-xs text-purple-700 font-medium mb-1">📋 Sesiones estimadas: {plan.sesiones_estimadas}</p>
        <p className="text-xs text-purple-600">{plan.estructura_sesiones}</p>
      </div>
      <div>
        <p className="text-xs text-slate-400 uppercase tracking-wide mb-2">Objetivos terapéuticos</p>
        <ul className="space-y-1">{(plan.objetivos||[]).map((o,i)=><li key={i} className="flex gap-2 text-xs text-slate-700"><span className="text-brand-400 font-bold mt-0.5">{i+1}.</span>{o}</li>)}</ul>
      </div>
      <div>
        <p className="text-xs text-slate-400 uppercase tracking-wide mb-2">Estrategias de intervención</p>
        <ul className="space-y-1">{(plan.estrategias||[]).map((e,i)=><li key={i} className="flex gap-2 text-xs text-slate-700"><span className="text-green-500">•</span>{e}</li>)}</ul>
      </div>
      {plan.instrumentos_sugeridos?.length>0 && <div>
        <p className="text-xs text-slate-400 uppercase tracking-wide mb-2">Instrumentos sugeridos</p>
        <div className="flex flex-wrap gap-1">{plan.instrumentos_sugeridos.map((ins,i)=><span key={i} className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full border border-blue-100">{ins}</span>)}</div>
      </div>}
      {plan.observaciones && <div className="bg-amber-50 border border-amber-100 rounded-lg p-3">
        <p className="text-xs text-amber-700 font-medium mb-1">💡 Observaciones clínicas</p>
        <p className="text-xs text-amber-600">{plan.observaciones}</p>
      </div>}
      <p className="text-xs text-slate-400 italic">Plan generado con apoyo IA. Edítalo según tu criterio clínico.</p>
    </div>
  )
}

function PatientDetail({ patient: p, onEdit, onClose, onExport, patSessions=[], patInstr=[], profile=null, supabaseUrl='' }) {
  const [detailTab, setDetailTab] = useState('ficha')
  const Field = ({ label, value }) => !value ? null : <div><p className="text-xs text-slate-400 mb-0.5">{label}</p><p className="text-sm text-slate-700 leading-relaxed">{value}</p></div>
  const Section = ({ title, children }) => <div className="mb-5"><p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">{title}</p><div className="space-y-3">{children}</div></div>
  const tabs = [
    {id:'ficha', label:'Ficha'},
    {id:'plan', label:'Plan terapéutico'},
    {id:'sesiones', label:`Sesiones (${patSessions.length})`},
    {id:'instrumentos', label:`Instrumentos (${patInstr.length})`},
  ]
  return (
    <div>
      {/* Cabecera del paciente */}
      <div className="flex items-start justify-between mb-4 pb-4 border-b border-slate-100">
        <div className="flex items-center gap-3">
          <div className="w-11 h-11 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 text-lg font-bold">{p.name.charAt(0).toUpperCase()}</div>
          <div>
            <h4 className="font-semibold text-slate-800">{p.name}</h4>
            <p className="text-slate-500 text-sm">{[p.age?`${p.age} años`:null,p.sex,p.marital_status,p.occupation].filter(Boolean).join(' · ')}</p>
            {(p.phone||p.emergency_contact_name) && <p className="text-slate-400 text-xs mt-0.5">{p.phone&&`📞 ${p.phone}`}{p.phone&&p.emergency_contact_name&&' · '}{p.emergency_contact_name&&`🆘 ${p.emergency_contact_name}${p.emergency_contact_phone?' ('+p.emergency_contact_phone+')':''}`}</p>}
          </div>
        </div>
        <div className="flex flex-col items-end gap-2">
          {p.process_status && <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${STATUS_COLORS[p.process_status]||STATUS_COLORS.activo}`}>{STATUS_LABELS[p.process_status]}</span>}
          <button onClick={()=>generateFirstVisitPrintable(p, profile)} className="text-xs bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 transition-colors">
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            Preparar primera cita
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 bg-slate-100 rounded-lg p-1 mb-4 overflow-x-auto">
        {tabs.map(t=>(
          <button key={t.id} type="button" onClick={()=>setDetailTab(t.id)}
            className={`flex-1 text-xs font-medium py-1.5 rounded-md transition-colors whitespace-nowrap px-2 ${detailTab===t.id?'bg-white text-slate-800 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="max-h-96 overflow-y-auto pr-1 space-y-1">
        {detailTab==='ficha' && <>
          <Section title="Datos personales">
            <Field label="Teléfono" value={p.phone}/>
            <Field label="Estado civil" value={p.marital_status}/>
            <Field label="Nivel educativo" value={p.education_level}/>
            <Field label="Ocupación" value={p.occupation}/>
            <Field label="Red de apoyo" value={p.support_network}/>
            {p.emergency_contact_name && <Field label="Contacto de emergencia" value={`${p.emergency_contact_name}${p.emergency_contact_phone?' — '+p.emergency_contact_phone:''}`}/>}
          </Section>
          <Section title="Consulta"><Field label="Motivo de consulta" value={p.consultation_reason}/><Field label="Fuente de derivación" value={p.referral_source}/><Field label="Frecuencia de sesión" value={p.session_frequency}/><Field label="Fecha de inicio" value={p.process_start_date}/><Field label="Enfoque terapéutico" value={p.therapeutic_approach}/></Section>
          <Section title="Antecedentes"><Field label="Personales" value={p.background_personal}/><Field label="Familiares" value={p.background_family}/><Field label="Médicos" value={p.background_medical}/></Section>
          <Section title="Diagnóstico y formulación"><Field label="Diagnóstico presuntivo" value={p.presumptive_diagnosis}/><Field label="Formulación del caso" value={p.diagnostic_axes}/></Section>
          {p.notes && <Section title="Notas"><Field label="" value={p.notes}/></Section>}
        </>}

        {detailTab==='plan' && (
          <TherapeuticPlan patient={p} profile={profile} supabaseUrl={supabaseUrl} />
        )}

        {detailTab==='sesiones' && (
          patSessions.length===0 ? (
            <div className="text-center py-8 text-slate-400 text-sm">Sin sesiones registradas para este paciente</div>
          ) : (
            <div className="space-y-3">
              {patSessions.sort((a,b)=>new Date(b.session_date)-new Date(a.session_date)).map(s=>(
                <div key={s.id} className="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-semibold text-slate-700 text-sm">Sesión #{s.session_number||'—'} — {s.session_date||'—'}</span>
                    {s.mood_start&&s.mood_end&&<span className={`text-xs font-medium ${s.mood_end>s.mood_start?'text-green-600':s.mood_end<s.mood_start?'text-red-500':'text-slate-500'}`}>{s.mood_start}→{s.mood_end} {s.mood_end>s.mood_start?'↑':s.mood_end<s.mood_start?'↓':'→'}</span>}
                  </div>
                  {s.content&&<div className="mb-1"><p className="text-xs text-slate-400">Contenido</p><p className="text-xs text-slate-700">{s.content}</p></div>}
                  {s.interventions&&<div className="mb-1"><p className="text-xs text-slate-400">Intervenciones</p><p className="text-xs text-slate-700">{s.interventions}</p></div>}
                  {s.homework&&<div><p className="text-xs text-slate-400">Tareas</p><p className="text-xs text-slate-700">{s.homework}</p></div>}
                </div>
              ))}
            </div>
          )
        )}

        {detailTab==='instrumentos' && (
          patInstr.length===0 ? (
            <div className="text-center py-8 text-slate-400 text-sm">Sin instrumentos aplicados a este paciente</div>
          ) : (
            <div className="space-y-2">
              {patInstr.map(r=>(
                <div key={r.id} className="bg-slate-50 rounded-xl p-3 border border-slate-200">
                  <div className="flex items-center justify-between mb-1">
                    <span className="font-semibold text-slate-700 text-sm">{r.instrument_name}</span>
                    <span className="text-xs text-slate-400">{r.applied_at}</span>
                  </div>
                  <p className="text-xs text-slate-600">{r.interpretation?.slice(0,120)}{r.interpretation?.length>120?'...':''}</p>
                </div>
              ))}
            </div>
          )
        )}
      </div>

      <div className="flex justify-end gap-3 mt-5 pt-4 border-t border-slate-100">
        <button onClick={onClose} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cerrar</button>
        <button onClick={onExport} className="px-4 py-2 rounded-lg border border-green-200 bg-green-50 text-green-700 hover:bg-green-100 text-sm font-medium flex items-center gap-1.5">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Exportar PDF
        </button>
        <button onClick={onEdit} className="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Editar ficha</button>
      </div>
    </div>
  )
}

function Patients({ user, role, planExpiry }) {
  const [patients, setPatients] = useState([])
  const [loading, setLoading] = useState(true)
  const [modal, setModal] = useState(null)
  const [selected, setSelected] = useState(null)
  const [selectedExpedient, setSelectedExpedient] = useState(null)
  const [newPatientCreated, setNewPatientCreated] = useState(null)
  const [err, setErr] = useState('')
  const [busy, setBusy] = useState(false)
  const [search, setSearch] = useState('')
  const [sessions, setSessions] = useState([])
  const [instrResults, setInstrResults] = useState([])
  const [profile, setProfile] = useState(null)
  const [interviews, setInterviews] = useState([])
  const load = useCallback(async () => {
    setLoading(true)
    const [pRes, sRes, iRes, prRes] = await Promise.all([
      sb.from('patients').select('*').eq('user_id', user.id).order('created_at', { ascending: false }),
      sb.from('sessions').select('*').eq('user_id', user.id),
      sb.from('instrument_results').select('*').eq('user_id', user.id),
      sb.from('psychologist_profiles').select('*').eq('user_id', user.id).single()
    ])
    setPatients(pRes.data || [])
    setSessions(sRes.data || [])
    setInstrResults(iRes.data || [])
    setProfile(prRes.data || null)
    // Load interviews silently
    const { data: ivData } = await sb.from('initial_interviews').select('*').eq('user_id', user.id)
    setInterviews(ivData || [])
    setLoading(false)
  }, [user.id])
  useEffect(()=>{ load() },[load])
  const filteredPatients = patients.filter(p =>
    search.trim() === '' ||
    p.name?.toLowerCase().includes(search.toLowerCase()) ||
    p.occupation?.toLowerCase().includes(search.toLowerCase()) ||
    p.presumptive_diagnosis?.toLowerCase().includes(search.toLowerCase())
  )

  const openCreate = () => {
    if (!canAddPatient(role, patients.length, planExpiry)) {
      const limit = PLAN_LIMITS[role]?.maxPatients || 5
      setErr(`Tu plan ${PLAN_LIMITS[role]?.label||'Gratis'} permite hasta ${limit} pacientes. Actualiza para agregar más.`)
      return
    }
    setSelected(null); setErr(''); setModal('create')
  }
  const openEdit   = p  => { setSelected(p); setErr(''); setModal('edit') }
  const openView   = p  => { setSelectedExpedient(p) }
  const openDelete = p  => { setSelected(p); setModal('delete') }
  const close = () => { setModal(null); setSelected(null) }
  const save = async (form) => {
    if (!form.name.trim()) return setErr('El nombre es requerido')
    setBusy(true); setErr('')
    const payload = { user_id:user.id, name:form.name.trim(), age:form.age?parseInt(form.age):null, sex:form.sex||null, phone:form.phone||null, marital_status:form.marital_status||null, education_level:form.education_level||null, occupation:form.occupation||null, support_network:form.support_network||null, emergency_contact_name:form.emergency_contact_name||null, emergency_contact_phone:form.emergency_contact_phone||null, consultation_reason:form.consultation_reason||null, background_personal:form.background_personal||null, background_family:form.background_family||null, background_medical:form.background_medical||null, presumptive_diagnosis:form.presumptive_diagnosis||null, diagnostic_axes:form.diagnostic_axes||null, process_start_date:form.process_start_date||null, process_status:form.process_status||'activo', therapeutic_approach:form.therapeutic_approach||null, session_frequency:form.session_frequency||null, referral_source:form.referral_source||null, notes:form.notes||null }
    let error
    if (modal==='edit') { ;({ error } = await sb.from('patients').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', selected.id)) }
    else { ;({ error } = await sb.from('patients').insert(payload)) }
    if (error) { setErr('Error al guardar. Intenta de nuevo.'); setBusy(false); return }
    if (modal === 'edit') {
      close(); await load()
      if (selectedExpedient) {
        const { data: refreshed } = await sb.from('patients').select('*').eq('id', selectedExpedient.id).single()
        if (refreshed) setSelectedExpedient(refreshed)
      }
    } else {
      // New patient — load list then show post-create options
      await load()
      const { data: refreshed } = await sb.from('patients').select('*').eq('user_id', user.id).order('created_at', {ascending: false}).limit(1)
      setNewPatientCreated(refreshed?.[0] || { name: form.name.trim() })
      setModal('post_create')
    }
    setBusy(false)
  }
  const destroy = async () => { await sb.from('patients').delete().eq('id', selected.id); close(); load() }
  // Show expedient if a patient is selected
  if (selectedExpedient) {
    return (
      <PatientExpedient
        user={user} role={role} planExpiry={planExpiry}
        patient={selectedExpedient} profile={profile}
        allSessions={sessions} allInstrResults={instrResults}
        onBack={() => { setSelectedExpedient(null); load() }}
        onEdit={() => { setSelected(selectedExpedient); setErr(''); setModal('edit') }}
      />
    )
  }

  return (
    <div className="p-6 fade-in">
      <div className="flex items-center justify-between mb-6">
        <div><h2 className="text-2xl font-display font-semibold text-slate-800">Pacientes</h2><p className="text-slate-500 text-sm mt-0.5">{patients.length} paciente{patients.length!==1?'s':''} registrado{patients.length!==1?'s':''}</p></div>
        <button onClick={openCreate} className="bg-brand-500 hover:bg-brand-600 text-white font-medium px-4 py-2 rounded-lg flex items-center gap-2 text-sm transition-colors">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Nuevo paciente
        </button>
      </div>

      {/* Buscador */}
      {patients.length > 0 && (
        <div className="relative mb-5">
          <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none">
            <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <input
            className="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white placeholder-slate-400"
            placeholder="Buscar por nombre, ocupación o diagnóstico..."
            value={search} onChange={e=>setSearch(e.target.value)}
          />
          {search && (
            <button onClick={()=>setSearch('')} className="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          )}
        </div>
      )}
      {loading ? <div className="text-center py-20 text-slate-400">Cargando...</div>
      : patients.length===0 ? (
        <div className="bg-white rounded-2xl border border-slate-200 p-16 text-center">
          <svg className="w-12 h-12 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <p className="text-slate-500 font-medium">Sin pacientes todavía</p><p className="text-slate-400 text-sm mt-1">Presiona "Nuevo paciente" para comenzar</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200"><tr>{['Nombre','Edad','Ocupación','Estado',''].map((h,i)=><th key={i} className={`px-5 py-3 font-medium text-slate-500 ${i===4?'text-right':'text-left'}`}>{h}</th>)}</tr></thead>
            <tbody className="divide-y divide-slate-100">
              {filteredPatients.length === 0 && search ? (
                <tr><td colSpan={5} className="px-5 py-10 text-center text-slate-400 text-sm">No se encontraron pacientes con "{search}"</td></tr>
              ) : filteredPatients.map(p=>(
                <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                  <td className="px-5 py-3.5"><button onClick={()=>openView(p)} className="font-medium text-brand-600 hover:text-brand-800 hover:underline text-left">{p.name}</button></td>
                  <td className="px-5 py-3.5 text-slate-600">{p.age??'—'}</td>
                  <td className="px-5 py-3.5 text-slate-600">{p.occupation??'—'}</td>
                  <td className="px-5 py-3.5"><span className={`text-xs font-medium px-2 py-0.5 rounded-full ${STATUS_COLORS[p.process_status]||STATUS_COLORS.activo}`}>{STATUS_LABELS[p.process_status]||'Activo'}</span></td>
                  <td className="px-5 py-3.5 text-right space-x-1">
                    <button onClick={()=>openEdit(p)} className="text-brand-500 hover:text-brand-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-brand-50 transition-colors">Editar</button>
                    <button onClick={()=>openDelete(p)} className="text-red-500 hover:text-red-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">Eliminar</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {/* PatientDetail replaced by PatientExpedient full-page navigation */}
      {(modal==='create'||modal==='edit') && <Modal title={modal==='edit'?'Editar ficha':'Nuevo paciente'} onClose={close} wide><PatientForm initial={modal==='edit'?selected:null} onSave={save} onClose={close} busy={busy} err={err} /></Modal>}

      {modal==='post_create' && newPatientCreated && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl fade-in">
            <div className="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg className="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
            </div>
            <h3 className="text-lg font-semibold text-slate-800 text-center mb-1">Paciente registrado</h3>
            <p className="text-slate-500 text-sm text-center mb-2"><strong>{newPatientCreated.name}</strong> fue agregado correctamente.</p>
            <p className="text-xs text-slate-400 text-center mb-5">Sigue los pasos para preparar la primera cita:</p>
            <div className="space-y-3">
              {/* Paso 1 */}
              <div className="border border-orange-200 rounded-xl p-3 bg-orange-50">
                <p className="text-xs font-bold text-orange-700 mb-2">Paso 1 — Imprime los documentos</p>
                <p className="text-xs text-orange-600 mb-3">Entrevista inicial · Protocolo de riesgo · Plan de seguridad · Consentimiento informado</p>
                <button onClick={()=>{ generateFirstVisitPrintable(newPatientCreated, profile) }}
                  className="w-full py-2.5 rounded-lg bg-orange-500 hover:bg-orange-600 text-white font-medium text-xs flex items-center justify-center gap-2 transition-colors">
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                  Generar e imprimir documentos
                </button>
              </div>

function ResetPassword({ onDone }) {
  const [form, setForm] = useState({ password: '', confirm: '' })
  const [err, setErr]   = useState('')
  const [busy, setBusy] = useState(false)
  const [done, setDone] = useState(false)

  const submit = async e => {
    e.preventDefault(); setErr('')
    if (form.password.length < 6) return setErr('La contraseña debe tener al menos 6 caracteres')
    if (form.password !== form.confirm) return setErr('Las contraseñas no coinciden')
    setBusy(true)
    const { error } = await sb.auth.updateUser({ password: form.password })
    if (error) setErr('Error al actualizar. Intenta de nuevo.')
    else setDone(true)
    setBusy(false)
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-brand-900 via-brand-700 to-brand-500 flex items-center justify-center p-4">
      <div className="w-full max-w-md fade-in">

            <div className="text-center">

              <form onSubmit={submit} className="space-y-4">

            </>
          )}
        </div>
      </div>
    </div>
  )
}

function App() {
  const { user, role, loading, signOut, planExpiry } = useAuth()
  const [screen, setScreen] = useState('login')
  const [isRecovery, setIsRecovery] = useState(false)

  useEffect(() => {
    // Detect password recovery token in URL hash
    const hash = window.location.hash
    if (hash.includes('type=recovery') || hash.includes('access_token')) {
      const params = new URLSearchParams(hash.replace('#',''))
      if (params.get('type') === 'recovery') {
        setIsRecovery(true)
        // Clear hash from URL
        window.history.replaceState(null, '', window.location.pathname)
      }
    }
    // Also listen for auth state change with recovery event
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') setIsRecovery(true)
    })
  }, [])

  if (loading) return <div className="min-h-screen flex items-center justify-center"><p className="text-slate-400 text-sm">Cargando...</p></div>
  if (isRecovery) return <ResetPassword onDone={()=>{ setIsRecovery(false); setScreen('login') }} />
  if (user) return <Dashboard user={user} role={role} planExpiry={planExpiry} onLogout={signOut} />
  if (screen==='register') return <Register onGo={setScreen} />
  if (screen==='forgot')   return <ForgotPassword onBack={()=>setScreen('login')} />
  return <Login onGo={setScreen} />
}

window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('pwa-banner')
  if (banner) banner.style.display = 'none'
})
function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt()
    deferredPrompt.userChoice.then(() => { deferredPrompt = null })
  }
}
</script>
<div id="pwa-banner" style="display:none;position:fixed;bottom:80px;left:16px;right:16px;background:#1a2460;color:white;border-radius:16px;padding:12px 16px;align-items:center;gap:12px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.3)">
  <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4361ee"/><path d="M6 16 Q9 9 12 16 Q15 23 18 16 Q21 9 24 14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/><circle cx="6" cy="16" r="1.8" fill="white"/><circle cx="24" cy="14" r="1.8" fill="white"/></svg>
  <div style="flex:1">
    <p style="font-size:13px;font-weight:700;margin:0">Instalar Psicoval</p>
    <p style="font-size:11px;color:rgba(255,255,255,.7);margin:0">Accede rápido desde tu pantalla de inicio</p>
  </div>
  <button onclick="installPWA()" style="background:#4361ee;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer">Instalar</button>
  <button onclick="document.getElementById('pwa-banner').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:4px">✕</button>
</div>

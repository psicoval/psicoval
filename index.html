// ── Auth Context ──────────────────────────────────────────
const AuthCtx = createContext(null)
function AuthProvider({ children }) {
  const [user, setUser] = useState(null)
  const [role, setRole] = useState('free')
  const [loading, setLoading] = useState(true)
  const [planExpiry, setPlanExpiry] = useState(null)

  const loadRole = async (uid) => {
    const { data } = await sb.from('profiles').select('role,expires_at').eq('id', uid).single()
    if (data) {
      setRole(data.role)
      setPlanExpiry(data.expires_at || null)
    }
  }
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      const u = session?.user ?? null; setUser(u)
      if (u) loadRole(u.id)
      setLoading(false)
    })
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => {
      const u = session?.user ?? null; setUser(u)
      if (u) loadRole(u.id)
    })
    return () => subscription.unsubscribe()
  }, [])
  return (
    <AuthCtx.Provider value={{ user, role, loading,
      planExpiry,
      signUp: (email, pass, name) => sb.auth.signUp({ email, password: pass, options: { data: { name } } }),
      signIn: (email, pass) => sb.auth.signInWithPassword({ email, password: pass }),
      signOut: () => sb.auth.signOut(),
    }}>{children}</AuthCtx.Provider>
  )
}
const useAuth = () => useContext(AuthCtx)

// ── Análisis IA ───────────────────────────────────────────
function AIAnalysis({ form, patientName }) {
  const [result, setResult] = useState(null)
  const [loading, setLoading] = useState(false)
  const [error, setError]   = useState('')
  const [expanded, setExpanded] = useState(true)

  const hasContent = form.problem_description || form.problem_triggers || form.consultation_reason ||
    form.area_work || form.area_family || form.previous_treatments || form.significant_events

  const analyze = async () => {
    if (!hasContent) return setError('Completa al menos el motivo de consulta o la descripción del problema antes de usar el análisis IA.')
    setLoading(true); setError(''); setResult(null)

    const prompt = `Eres un asistente clínico de apoyo para psicólogos. Basándote en la información de entrevista inicial que te comparto, genera:

1. DIAGNÓSTICO PRESUNTIVO SUGERIDO: Propón 1 o 2 diagnósticos presuntivos (con código CIE-11 o DSM-5 si aplica), explicando brevemente el razonamiento clínico. Usa lenguaje técnico pero claro.

2. PROCESO DE INTERVENCIÓN SUGERIDO: Propón un esquema de intervención genérico (no atado a ningún modelo específico) con fases y estrategias generales aplicables. Indica posibles instrumentos de evaluación complementaria.

IMPORTANTE: Aclara siempre que esta es una sugerencia de apoyo clínico, no un diagnóstico definitivo. La decisión clínica final corresponde al profesional tratante.

DATOS DE LA ENTREVISTA:
Paciente: ${patientName}
Motivo de consulta: ${form.problem_description || form.consultation_reason || 'No especificado'}
Frecuencia/intensidad: ${form.problem_frequency || 'No especificado'}
Desencadenantes: ${form.problem_triggers || 'No especificado'}
Consecuencias: ${form.problem_consequences || 'No especificado'}
Intentos de solución previos: ${form.previous_solutions || 'No especificado'}
Área laboral: ${form.area_work || 'No especificado'}
Área familiar: ${form.area_family || 'No especificado'}
Área social: ${form.area_social || 'No especificado'}
Área salud física: ${form.area_health || 'No especificado'}
Tratamientos previos: ${form.previous_treatments || 'No especificado'}
Medicación actual: ${form.current_medication || 'No especificado'}
Eventos vitales significativos: ${form.significant_events || 'No especificado'}
Historia del problema: ${form.problem_history || 'No especificado'}

Responde de forma estructurada, clara y concisa. Usa viñetas donde sea apropiado.`

    try {
      const response = await fetch('https://lgbpuddqjzcbszmnuclb.supabase.co/functions/v1/ai-analysis', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnYnB1ZGRxanpjYnN6bW51Y2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDUxMjAsImV4cCI6MjA5MTA4MTEyMH0.WSW3O6AEtWvYLW7njiKpQfQGptxPzf_zt2ai_eey_vM`,
          'apikey': `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnYnB1ZGRxanpjYnN6bW51Y2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDUxMjAsImV4cCI6MjA5MTA4MTEyMH0.WSW3O6AEtWvYLW7njiKpQfQGptxPzf_zt2ai_eey_vM`,
        },
        body: JSON.stringify({ prompt })
      })
      const data = await response.json()
      const text = data.result || ''
      if (!text) throw new Error('Sin respuesta')
      setResult(text)
      setExpanded(true)
    } catch(e) {
      setError('Error al conectar con el análisis IA. Intenta de nuevo.')
    }
    setLoading(false)
  }

  return (
    <div className="mt-2">
      <div className="border-2 border-dashed border-brand-200 rounded-2xl p-4 bg-brand-50">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2">
            <span className="text-xl">🤖</span>
            <div>
              <p className="font-semibold text-slate-800 text-sm">Análisis clínico con IA</p>
              <p className="text-xs text-slate-500">Diagnóstico presuntivo y proceso de intervención sugerido</p>
            </div>
          </div>
          {result && (
            <button type="button" onClick={()=>setExpanded(!expanded)}
              className="text-xs text-brand-500 hover:text-brand-700 font-medium">
              {expanded ? 'Ocultar ▲' : 'Ver resultado ▼'}
            </button>
          )}
        </div>

        {error && <p className="text-red-500 text-xs mb-3 bg-red-50 px-3 py-2 rounded-lg">{error}</p>}

        {!result && (
          <button type="button" onClick={analyze} disabled={loading}
            className="w-full py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium transition-colors disabled:opacity-50 flex items-center justify-center gap-2">
            {loading ? (
              <><svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Analizando información clínica...</>
            ) : (
              <><span>✨</span> Generar análisis clínico con IA</>
            )}
          </button>
        )}

        {result && expanded && (
          <div className="mt-3">
            <div className="bg-white rounded-xl border border-brand-100 p-4 text-sm text-slate-700 leading-relaxed whitespace-pre-wrap max-h-64 overflow-y-auto">
              {result}
            </div>
            <div className="flex items-start gap-2 mt-3 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
              <span className="text-amber-500 mt-0.5 flex-shrink-0">⚠️</span>
              <p className="text-xs text-amber-700">Este análisis es una sugerencia de apoyo clínico generada por IA. No reemplaza el juicio profesional del psicólogo tratante ni constituye un diagnóstico definitivo.</p>
            </div>
            <button type="button" onClick={()=>{setResult(null);setExpanded(true)}}
              className="mt-2 text-xs text-slate-400 hover:text-slate-600">
              ↺ Regenerar análisis
            </button>
          </div>
        )}
      </div>
    </div>
  )
}

            <Divider/>
            <div className="space-y-4">

              {/* A - Antecedentes */}

                  ['emociones_intensas','Emociones intensas'],
                  ['contexto_laboral','Contexto laboral/académico'],
                  ['conflictos','Conflictos interpersonales'],
                  ['soledad','Estar solo/a'],
                  ['fatiga','Cansancio o fatiga'],
                  ['noche','Horario nocturno'],
                  ['sin_estructura','Falta de rutina'],
                ]} value={form.triggers} onChange={v=>f('triggers',v)} />
                <input type="text" className="w-full border border-blue-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white"
                  placeholder="Otros disparadores específicos..."
                  value={form.triggers_other||''} onChange={e=>f('triggers_other',e.target.value)}/>
              </div>

              {/* B - Conducta/Respuesta */}
              <div className="bg-purple-50 border border-purple-100 rounded-xl p-3 space-y-2">
                <p className="text-xs font-semibold text-purple-700">B — Conducta / Respuesta ante el disparador</p>

                <CheckGroup label="" options={[
                  ['evitacion_cond','Evitas la situación'],
                  ['escape','Escapas / te retiras'],
                  ['busqueda_tranquil','Buscas tranquilizarte (respiración, distracciones)'],
                  ['rumiacion','Le das vueltas al problema (rumiación)'],
                  ['busqueda_apoyo_b','Buscas apoyo en otra persona'],
                  ['paralisis','Te quedas paralizado/a, sin actuar'],
                  ['irritabilidad','Reaccionas con irritabilidad o agresividad'],
                  ['compensacion','Haces algo para compensar (comer, comprar, otros)'],
                  ['enduras','Lo aguantas y sigues (supresión)'],
                ]} value={form.behaviors||[]} onChange={v=>f('behaviors',v)} />
                <textarea className="w-full border border-purple-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white resize-none"
                  rows={2} placeholder="Describe cómo responde el paciente ante el disparador..."
                  value={form.behaviors_notes||''} onChange={e=>f('behaviors_notes',e.target.value)}/>
              </div>

              {/* C - Consecuencias */}
              <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 space-y-2">
                <p className="text-xs font-semibold text-amber-700">C — Consecuencias</p>

                <CheckGroup label="" options={[
                  ['alivio_inmediato','Alivio inmediato (refuerzo negativo)'],
                  ['evitacion','Evitación / escape mantenido'],
                  ['conflictos','Conflictos relacionales'],
                  ['culpa','Culpa o vergüenza'],
                  ['aislamiento','Mayor aislamiento'],
                  ['malestar_prolongado','Malestar que se prolonga'],
                  ['conducta_compensatoria','Conductas compensatorias'],
                  ['busqueda_apoyo','Búsqueda de apoyo externo'],
                ]} value={form.consequences} onChange={v=>f('consequences',v)} />
                <textarea className="w-full border border-amber-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white resize-none"
                  rows={2} placeholder="Consecuencias adicionales relevantes..."
                  value={form.consequences_notes||''} onChange={e=>f('consequences_notes',e.target.value)}/>
              </div>
            </div>
          </div>
        )}

        {/* BLOQUE 1: RIESGO SUICIDA — después del motivo, integrado en la entrevista */}
        {block===1 && (
          <div className="space-y-4">
            <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
              <p className="text-xs font-semibold text-slate-600 mb-1">Indicación clínica (Evaluación de riesgo)</p>
              <p className="text-xs text-slate-500 italic">Después de escuchar el motivo de consulta, y de forma natural: «Antes de continuar, necesito preguntarte algo importante: ¿Has tenido pensamientos de hacerte daño o de quitarte la vida?»</p>
              <p className="text-xs text-slate-400 mt-1">Si la respuesta es no → registrar "Sin ideación" y avanzar. Si es sí → desplegar el protocolo.</p>
            </div>

            <RadioGroup label="Respuesta del paciente (Nivel de ideación)" name="risk" value={form.risk_level}
              onChange={v=>f('risk_level',v)}
              options={[['sin_ideacion','Sin ideación'],['pasiva','Ideación pasiva'],['activa_sin_plan','Activa sin plan'],['con_plan','Con plan'],['intento_previo','Intento previo']]} />

            {form.risk_level && form.risk_level !== 'sin_ideacion' && (
              <div className="bg-white border border-red-200 rounded-xl p-4 space-y-4">
                <p className="text-xs font-semibold text-red-700 uppercase tracking-wide">Protocolo de evaluación de riesgo</p>
                <p className="text-xs text-slate-400 italic">Continuar con preguntas naturales: «¿Con qué frecuencia te pasa esto?» «¿Has pensado en cómo lo harías?» «¿Tienes acceso a medios?» «¿Qué te ha detenido hasta ahora?»</p>

                <div>
                  <p className="text-xs text-red-600 font-medium mb-2">Factores de riesgo</p>
                  <div className="space-y-2">
                    {[
                      ['risk_has_plan','¿Ha pensado en cómo lo haría? (Plan específico)'],
                      ['risk_has_means','¿Tiene acceso a los medios para llevarlo a cabo?'],
                      ['risk_immediate_intention','¿Expresa intención de actuar de forma inmediata?'],
                    ].map(([key,lbl])=>(
                      <label key={key} className={`flex items-center gap-3 p-2.5 rounded-lg border cursor-pointer transition-all ${form[key]?'bg-red-50 border-red-300':'bg-slate-50 border-slate-200 hover:border-red-200'}`}>
                        <input type="checkbox" checked={form[key]||false} onChange={e=>f(key,e.target.checked)} className="w-4 h-4 accent-red-500 flex-shrink-0"/>
                        <span className="text-xs text-slate-700">{lbl}</span>
                        {form[key] && <span className="ml-auto text-xs font-bold text-red-600">⚠ SÍ</span>}
                      </label>
                    ))}
                  </div>
                </div>

                <div>
                  <p className="text-xs text-slate-600 font-medium mb-2">Factores protectores — «¿Hay alguien con quien puedas contar?» «¿Te sientes seguro/a estando solo/a?»</p>
                  <div className="space-y-2">
                    {[
                      ['risk_support_available','Cuenta con red de apoyo disponible ahora'],
                      ['risk_can_stay_alone','Puede estar solo/a con seguridad'],
                    ].map(([key,lbl])=>(
                      <label key={key} className={`flex items-center gap-3 p-2.5 rounded-lg border cursor-pointer transition-all ${form[key]?'bg-green-50 border-green-300':'bg-slate-50 border-slate-200 hover:border-green-200'}`}>
                        <input type="checkbox" checked={form[key]||false} onChange={e=>f(key,e.target.checked)} className="w-4 h-4 accent-green-500 flex-shrink-0"/>
                        <span className="text-xs text-slate-700">{lbl}</span>
                        {form[key] && <span className="ml-auto text-xs font-bold text-green-600">✓ SÍ</span>}
                      </label>
                    ))}
                  </div>
                </div>

                {(form.risk_has_plan || form.risk_has_means || form.risk_immediate_intention) && (
                  <div className="bg-red-100 border border-red-400 rounded-xl p-3">
                    <p className="text-xs font-bold text-red-800 mb-1">🚨 Riesgo alto — Acción inmediata</p>
                    <p className="text-xs text-red-700">Factores de riesgo activos. No dejar al paciente solo. Activar protocolo de seguridad completo desde la pestaña "Riesgo" del expediente.</p>
                  </div>
                )}
                {!form.risk_has_plan && !form.risk_has_means && !form.risk_immediate_intention && (
                  <div className="bg-amber-50 border border-amber-300 rounded-xl p-3">
                    <p className="text-xs font-semibold text-amber-800 mb-1">⚠ Riesgo presente — Seguimiento activo</p>
                    <p className="text-xs text-amber-700">Sin factores inmediatos identificados. Monitorear en cada sesión y completar protocolo de riesgo en el expediente.</p>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

                {/* B2: CONTEXTO VITAL */}
        {block===2 && (
          <div className="space-y-3">
            <Sec title="Si tuvieras que calificar estas áreas del 0 al 10, ¿qué número dirías? (Satisfacción vital)">
              <div className="grid grid-cols-1 gap-3">
                <ScaleInput label="Trabajo o estudios" value={form.sat_work} onChange={v=>f('sat_work',v)} leftLabel="0 — muy mal" rightLabel="10 — excelente"/>
                <ScaleInput label="Relación de pareja o familia" value={form.sat_family} onChange={v=>f('sat_family',v)} leftLabel="0 — muy mal" rightLabel="10 — excelente"/>
                <ScaleInput label="Vida social, amistades" value={form.sat_social} onChange={v=>f('sat_social',v)} leftLabel="0 — muy mal" rightLabel="10 — excelente"/>
                <ScaleInput label="¿Cómo está tu sueño últimamente?" value={form.sat_sleep} onChange={v=>f('sat_sleep',v)} leftLabel="0 — muy mal" rightLabel="10 — excelente"/>
              </div>
            </Sec>
            <Divider/>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-400 mb-1 block">¿Realizas actividad física? ¿Con qué frecuencia? (Hábitos de salud)</label>
                <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={form.physical_activity||''} onChange={e=>f('physical_activity',e.target.value)}>
                  <option value="">Seleccionar</option>
                  {[['sedentario','No realizo (sedentario)'],['ocasional','Ocasionalmente (1×/sem)'],['regular','Regularmente (2–3×/sem)'],['frecuente','Con frecuencia (4+×/sem)']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-400 mb-1 block">¿Cómo describirías tu alimentación actualmente? (Hábitos alimentarios)</label>
                <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={form.eating_habits||''} onChange={e=>f('eating_habits',e.target.value)}>
                  <option value="">Seleccionar</option>
                  {[['adecuados','Adecuados'],['irregulares','Irregulares'],['restriccion','Alterados — restricción'],['exceso','Alterados — exceso'],['muy_alt','Muy alterados']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
            </div>
            <Divider/>
            <CheckGroup label="¿Con quién cuentas en tu vida en este momento? (Red de apoyo)" options={SUPPORT} value={form.support_network} onChange={v=>f('support_network',v)} />
            <Divider/>
            <Textarea label="Notas del psicólogo (opcional)" rows={2} placeholder="Aspectos del contexto vital relevantes no recogidos arriba..."
              value={form.context_notes||''} onChange={e=>f('context_notes',e.target.value)} />
          </div>
        )}

        {/* B3: HISTORIA CLÍNICA */}
        {block===3 && (
          <div className="space-y-3">

              <RadioGroup label="¿Has ido antes a terapia o tratamiento psiquiátrico? (Tratamientos previos)" name="tto" value={form.previous_treatments} onChange={v=>f('previous_treatments',v)}
                options={[['ninguno','Sin tratamiento previo'],['uno','1 proceso'],['dos_tres','2–3 procesos'],['mas_tres','Más de 3'],['paralelo','Tratamiento paralelo actual']]} />
              <textarea className="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs mt-2 focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"
                rows={2} placeholder="¿Cómo fue esa experiencia? ¿Por qué terminó?" value={form.previous_treatments_notes||''} onChange={e=>f('previous_treatments_notes',e.target.value)}/>
            </div>
            <Divider/>
            <Sec title="¿Estás tomando algún medicamento? (Medicación actual)">
              <div className="grid grid-cols-2 gap-3">
                <CheckGroup options={[['ninguna','Sin medicación'],['psicofarmaco','Psicofármaco'],['medica','Médica general']]} value={form.medication_type} onChange={v=>f('medication_type',v)} />
                <Input label="Nombre / dosis" placeholder="Nombre del medicamento, dosis, quién lo recetó..." value={form.medication_detail||''} onChange={e=>f('medication_detail',e.target.value)} />
              </div>
            </Sec>
            <Divider/>
            <div>
              <CheckGroup label="¿Ha ocurrido algo importante — reciente o del pasado — que creas que influye en cómo te sientes? (Eventos vitales)" name="events" options={EVENTS} value={form.significant_events} onChange={v=>f('significant_events',v)} />
              <textarea className="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs mt-2 focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"

            </div>
            <Divider/>
            <div>
              <CheckGroup label="¿Tienes alguna condición médica importante que deba conocer? (Antecedentes médicos)" name="medical" options={MEDICAL} value={form.medical_history} onChange={v=>f('medical_history',v)} />
              <textarea className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm mt-2 focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"

                value={form.medical_detail||''} onChange={e=>f('medical_detail',e.target.value)}/>
            </div>
            <Divider/>
            <Sec title="¿Consumes alcohol u otras sustancias? (Consumo de sustancias)">
              <div className="space-y-2">
                <SubstanceRow label="Alcohol" value={form.substance_alcohol} onChange={v=>f('substance_alcohol',v)} />
                <SubstanceRow label="Tabaco" value={form.substance_tobacco} onChange={v=>f('substance_tobacco',v)} />
                <SubstanceRow label="Cannabis" value={form.substance_cannabis} onChange={v=>f('substance_cannabis',v)} />
                <SubstanceRow label="Otras sustancias" value={form.substance_other} onChange={v=>f('substance_other',v)} />
              </div>
            </Sec>
          </div>

        {/* B4: EVALUACIÓN CLÍNICA */}
        {block===4 && (

                {[
                  ['mse_appearance','Apariencia',[['adecuada','Adecuada'],['descuidada','Descuidada'],['llamativa','Llamativa'],['deteriorada','Deteriorada']]],
                  ['mse_language','Lenguaje',[['normal','Normal'],['lento','Enlentecido'],['acelerado','Acelerado'],['incoherente','Incoherente']]],

                  ['mse_reality','Contacto realidad',[['conservado','Conservado'],['parcial','Parcialmente alterado'],['alterado','Alterado']]],

                    <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"

                      {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>

              </div>
              <Input label="«Si tuvieras que ponerle una palabra a cómo te sientes, ¿cuál sería?» (Estado de ánimo subjetivo)" placeholder="Respuesta del paciente (registrar literalmente)..."
                value={form.mood_subjective||''} onChange={e=>f('mood_subjective',e.target.value)} />
            </Sec>
            <Divider/>
            <Sec title="Exploración de síntomas">
              <div className="grid grid-cols-2 gap-3">

                </div>
                <div>
                  <p className="text-xs text-slate-400 mb-2">Ansiedad — «¿Has tenido ataques de pánico? ¿Evitas situaciones o personas?»</p>
                  <CheckGroup options={SYM_ANX} value={form.symptoms_anxiety} onChange={v=>f('symptoms_anxiety',v)} />
                </div>
                <div>
                  <p className="text-xs text-slate-400 mb-2">Cognitivos — «¿Le das muchas vueltas a las cosas? ¿Te cuesta concentrarte?»</p>
                  <CheckGroup options={SYM_COG} value={form.symptoms_cognitive} onChange={v=>f('symptoms_cognitive',v)} />
                </div>
                <div>
                  <p className="text-xs text-slate-400 mb-2">Funcionamiento — «¿Has dejado de hacer cosas? ¿Te aíslas? ¿Sientes que funcionas peor?»</p>
                  <CheckGroup options={SYM_BEH} value={form.symptoms_behavioral} onChange={v=>f('symptoms_behavioral',v)} />
                </div>
              </div>
              {suggestedInstruments.length > 0 && (
                <div className="mt-2 bg-blue-50 border border-blue-100 rounded-lg p-3">
                  <p className="text-xs font-semibold text-blue-700 mb-1">Instrumentos sugeridos según síntomas:</p>
                  <div className="flex flex-wrap gap-1">
                    {suggestedInstruments.map(i=><span key={i} className="text-xs bg-white border border-blue-200 text-blue-700 px-2 py-0.5 rounded">{i}</span>)}
                  </div>
                  <p className="text-xs text-blue-500 mt-1">Confirmar en bloque 8</p>
                </div>
              )}
            </Sec>
            <Divider/>
            <Sec title="Impresión diagnóstica preliminar del profesional">
              <p className="text-xs text-slate-400 mb-2">Categoría clínica</p>
              <CheckGroup options={DIAG_CLIN} value={form.diag_clinical} onChange={v=>f('diag_clinical',v)} />
              <p className="text-xs text-slate-400 mb-2 mt-3">Problema contextual principal</p>
              <CheckGroup options={DIAG_CTX} value={form.diag_contextual} onChange={v=>f('diag_contextual',v)} />
              <textarea className="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs mt-2 focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"
                rows={2} placeholder="Notas diagnósticas adicionales..." value={form.diag_notes||''} onChange={e=>f('diag_notes',e.target.value)}/>
            </Sec>
            <Divider/>
            <Sec title="Evaluación global del caso (completar al final de la evaluación clínica)">
              <SeveritySelector value={form.global_severity} onChange={v=>f('global_severity',v)} />
            </Sec>
          </div>
        )}

        {/* B5: FORMULACIÓN */}
        {block===5 && (
          <div className="space-y-3">
            <Textarea label="Si tuviéramos que describir el problema en términos concretos, ¿qué está pasando? (Problema operacionalizado)" rows={3} placeholder="¿Cuál es el problema en términos funcionales/conductuales concretos?"
              value={form.problem_operationalized||''} onChange={e=>f('problem_operationalized',e.target.value)} />
            <Divider/>
            <CheckGroup label="¿Qué hace que este problema se mantenga? (Variables mantenedoras)" options={MAINTAINING} value={form.maintaining_variables} onChange={v=>f('maintaining_variables',v)} />
            <Divider/>
            <Textarea label="Mirando hacia atrás, ¿experiencias que lo hicieron más vulnerable? (Factores predisponentes)" rows={2} placeholder="Historia de aprendizaje, eventos tempranos, vulnerabilidad biológica..."
              value={form.predisposing_factors||''} onChange={e=>f('predisposing_factors',e.target.value)} />
            <Divider/>
            <CheckGroup label="¿Qué recursos tiene a su favor? (Factores protectores)" options={PROTECTIVE} value={form.protective_factors} onChange={v=>f('protective_factors',v)} />
          </div>
        )}

        {/* B6: PLAN */}
        {block===6 && (
          <div className="space-y-3">
            <Textarea label="¿Qué te gustaría lograr con este proceso? (Expectativas del paciente)" rows={3} placeholder="¿Qué espera lograr? ¿Cómo sería su vida si mejorara el problema?"
              value={form.patient_expectations||''} onChange={e=>f('patient_expectations',e.target.value)} />
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
              <p className="text-xs font-semibold text-amber-800 mb-1">«Si esto mejorara, ¿qué estarías haciendo diferente en tu vida?» — Objetivo conductual observable</p>
              <p className="text-xs text-amber-600 mb-2">¿Qué estaría haciendo diferente el paciente si mejora? (Esencial para ACT, TCC y medición de progreso)</p>
              <textarea className="w-full border border-amber-200 bg-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"
                rows={2} placeholder="Ej: Retomar actividades sociales semanalmente, completar tareas laborales sin evitación, dormir sin interrupciones..."
                value={form.behavioral_objective||''} onChange={e=>f('behavioral_objective',e.target.value)}/>
            </div>
            <Divider/>
            <div className="grid grid-cols-2 gap-4">
              <ScaleInput label="Del 0 al 10, ¿qué tan motivado/a te sientes para trabajar en esto? (Motivación)" value={form.motivation} onChange={v=>f('motivation',v)} leftLabel="0 — nula" rightLabel="10 — alta"/>
              <RadioGroup label="¿Qué tanto sientes que entiendes lo que te está pasando? (Insight)" name="insight" value={form.insight} onChange={v=>f('insight',v)}
                options={[['nulo','Nulo'],['parcial','Parcial'],['adecuado','Adecuado'],['elevado','Elevado']]} />
            </div>
            <Divider/>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-400 uppercase tracking-wide mb-1 block">Frecuencia de sesiones</label>
                <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={form.session_frequency||'semanal'} onChange={e=>f('session_frequency',e.target.value)}>
                  {[['semanal','Semanal'],['quincenal','Quincenal'],['mensual','Mensual'],['demanda','A demanda'],['intensiva','Intensiva (2×/sem)']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-400 uppercase tracking-wide mb-1 block">Necesidad de derivación</label>
                <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={form.derivation||'no'} onChange={e=>f('derivation',e.target.value)}>
                  {[['no','No requiere'],['psiquiatria','Psiquiatría'],['medico','Médico general'],['neurologia','Neurología'],['urgencias','Urgencias']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
            </div>
          </div>
        )}

        {/* CIERRE: INSTRUMENTOS + OBSERVACIONES + CURSO + IA */}
        {block===7 && (
          <div className="space-y-3">
            <Sec title="Instrumentos confirmados para sesión 2">
              {suggestedInstruments.length > 0 && (
                <div className="bg-blue-50 border border-blue-100 rounded-lg p-2 mb-2">
                  <p className="text-xs text-blue-600 mb-1.5">Sugeridos automáticamente:</p>
                  <div className="flex flex-wrap gap-1">
                    {suggestedInstruments.map(i=>(
                      <button key={i} type="button"
                        onClick={()=>{const arr=form.instruments_confirmed||[];f('instruments_confirmed',arr.includes(i)?arr.filter(x=>x!==i):[...arr,i])}}
                        className={`text-xs px-2 py-1 rounded border transition-all ${(form.instruments_confirmed||[]).includes(i)?'bg-brand-500 text-white border-brand-500':'bg-white text-blue-700 border-blue-300'}`}>
                        {i}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <CheckGroup label="Todos los disponibles" options={INSTRUMENTS_ALL} value={form.instruments_confirmed} onChange={v=>f('instruments_confirmed',v)} />
            </Sec>
            <Divider/>
            <Textarea label="Observaciones del evaluador" rows={3} placeholder="Impresión clínica general, actitud del paciente, aspectos destacados..."
              value={form.evaluator_notes||''} onChange={e=>f('evaluator_notes',e.target.value)} />
            <Divider/>
            <Sec title="¿Sientes que hoy pudimos hablar de lo más importante? ¿Hay algo que se haya quedado fuera?">
              <RadioGroup name="course" value={form.session_course} onChange={v=>f('session_course',v)}
                options={[['si','Sí — todos los bloques completados'],['parcial','Parcialmente — algunos incompletos'],['no','No — tomó un rumbo diferente']]} />
              {(form.session_course==='parcial'||form.session_course==='no') && (
                <div className="mt-2 space-y-2">
                  <div>
                    <p className="text-xs text-slate-400 uppercase tracking-wide mb-1.5">¿Qué ocurrió en la sesión?</p>
                    <CheckGroup options={[
                      ['crisis_emocional','Crisis emocional'],
                      ['resistencia','Resistencia / evitación'],
                      ['desregulacion','Desregulación emocional'],
                      ['falta_tiempo','Falta de tiempo'],
                      ['revelacion_trauma','Revelación de trauma'],
                      ['intervencion_crisis','Intervención de crisis'],
                      ['tema_urgente','Surgió tema urgente'],
                      ['fatiga_paciente','Fatiga del paciente'],
                    ]} value={form.session_course_reasons} onChange={v=>f('session_course_reasons',v)} />
                  </div>
                  <textarea className="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"
                    rows={2} placeholder="Contexto adicional para la IA..." value={form.session_course_notes||''} onChange={e=>f('session_course_notes',e.target.value)}/>
                  <p className="text-xs text-slate-400 italic">Esta información ayuda a la IA a interpretar correctamente los datos faltantes</p>
                </div>
              )}
            </Sec>
            <Divider/>
            {/* Resumen IA */}
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-4">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-purple-600 text-lg">🤖</span>
                <div>
                  <p className="font-semibold text-purple-800 text-sm">Resumen clínico con IA</p>
                  <p className="text-xs text-purple-600">Genera síntesis, hipótesis funcional y sugerencias para sesión 2</p>
                </div>
              </div>
              {!aiDone && !aiLoading && (
                <button type="button" onClick={generateAI}
                  className="w-full py-2.5 rounded-xl bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium transition-colors">
                  Generar resumen clínico con IA
                </button>
              )}
              {aiLoading && (
                <div className="text-center py-4">
                  <div className="inline-block w-5 h-5 border-2 border-purple-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                  <p className="text-xs text-purple-600">Analizando datos clínicos...</p>
                </div>
              )}
              {aiDone && aiData && (
                <div className="space-y-3">
                  {[['sintesis','Síntesis del problema'],['hipotesis','Hipótesis funcional'],['riesgo_integrado','Nivel de riesgo integrado'],['sesion2','Sugerencias para sesión 2']].map(([k,l])=>(
                    <div key={k}>
                      <p className="text-xs font-semibold text-purple-700 uppercase tracking-wide mb-1">{l}</p>
                      <p className="text-xs text-slate-700 bg-white border border-purple-100 rounded-lg p-2.5 leading-relaxed">{aiData[k]}</p>
                    </div>
                  ))}
                  <button type="button" onClick={()=>{setAiDone(false);f('ai_summary','')}}
                    className="text-xs text-purple-500 hover:text-purple-700">↺ Regenerar</button>
                </div>
              )}
              {aiDone && form.ai_summary==='error' && (
                <div>
                  <p className="text-xs text-red-500 mb-2">Error al generar. Intenta de nuevo.</p>
                  <button type="button" onClick={()=>{setAiDone(false);f('ai_summary','')}} className="text-xs text-purple-500">Reintentar</button>
                </div>
              )}
              <p className="text-xs text-purple-400 mt-2 italic">Apoyo clínico — el criterio profesional prevalece siempre</p>
            </div>
            <Divider/>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-400 uppercase tracking-wide mb-1 block">Estado de la entrevista</label>
                <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={form.status||'borrador'} onChange={e=>f('status',e.target.value)}>
                  <option value="borrador">Borrador</option>
                  <option value="completada">Completada</option>
                </select>
              </div>
            </div>
          </div>
        )}

      </div>

      {/* Footer navegación */}
      <div className="flex items-center justify-between pt-3 mt-3 border-t border-slate-100">
        <div className="flex gap-2">
          <button type="button" onClick={()=>setBlock(Math.max(0,block-1))} disabled={block===0}
            className="px-3 py-2 rounded-lg border border-slate-200 text-slate-500 text-sm disabled:opacity-30 hover:bg-slate-50">← Anterior</button>
          <button type="button" onClick={()=>setBlock(Math.min(7,block+1))} disabled={block===7}
            className="px-3 py-2 rounded-lg border border-slate-200 text-slate-500 text-sm disabled:opacity-30 hover:bg-slate-50">Siguiente →</button>
        </div>
        <div className="flex gap-3">
          <button type="button" onClick={onClose} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
          <button type="submit" disabled={busy} className="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium disabled:opacity-50">
            {busy?'Guardando...':initial?'Guardar cambios':'Guardar entrevista'}
          </button>
        </div>
      </div>
    </form>
  )
}

// Vista de lectura de la entrevista
function InterviewDetail({ interview: iv, patientName, onEdit, onClose }) {
  const aiData = (() => { try { return iv.ai_summary && iv.ai_summary!=='error' ? JSON.parse(iv.ai_summary) : null } catch(e){return null} })()
  const Field = ({ label, value }) => !value ? null : (
    <div className="mb-3">
      <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">{label}</p>
      <p className="text-sm text-slate-700 leading-relaxed">{Array.isArray(value) ? value.join(', ') : value}</p>
    </div>
  )
  const formatVal = v => typeof v === 'object' ? JSON.stringify(v) : String(v||'')
  return (
    <div className="flex flex-col" style={{maxHeight:'80vh'}}>
      <div className="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
        <div>
          <p className="font-semibold text-slate-800">{patientName}</p>
          <p className="text-xs text-slate-400 mt-0.5">Entrevista inicial · {new Date(iv.created_at).toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})}</p>
        </div>
        <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${iv.status==='completada'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-600'}`}>
          {iv.status==='completada'?'Completada':'Borrador'}
        </span>
      </div>
      <div className="overflow-y-auto flex-1 pr-1 space-y-2">
        {iv.risk_level && <Field label="Riesgo suicida" value={iv.risk_level.replace(/_/g,' ')} />}
        {iv.consultation_reason && <Field label="Motivo de consulta" value={iv.consultation_reason} />}
        {iv.global_severity && <Field label="Severidad global" value={iv.global_severity} />}
        {iv.diag_clinical?.length > 0 && <Field label="Diagnóstico clínico" value={iv.diag_clinical} />}
        {iv.diag_contextual?.length > 0 && <Field label="Problema contextual" value={iv.diag_contextual} />}
        {iv.symptoms_mood?.length > 0 && <Field label="Síntomas — estado de ánimo" value={iv.symptoms_mood} />}
        {iv.symptoms_anxiety?.length > 0 && <Field label="Síntomas — ansiedad" value={iv.symptoms_anxiety} />}
        {iv.maintaining_variables?.length > 0 && <Field label="Variables mantenedoras" value={iv.maintaining_variables} />}
        {iv.protective_factors?.length > 0 && <Field label="¿Qué recursos tiene a su favor? (Factores protectores)" value={iv.protective_factors} />}
        {iv.patient_expectations && <Field label="Expectativas del paciente" value={iv.patient_expectations} />}
        {iv.instruments_confirmed?.length > 0 && <Field label="Instrumentos sesión 2" value={iv.instruments_confirmed} />}
        {iv.evaluator_notes && <Field label="Observaciones del evaluador" value={iv.evaluator_notes} />}
        {aiData && (
          <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 mt-2">
            <p className="text-xs font-semibold text-purple-700 mb-3">Resumen clínico IA</p>
            {[['sintesis','Síntesis'],['hipotesis','Hipótesis funcional'],['riesgo_integrado','Riesgo integrado'],['sesion2','Sugerencias sesión 2']].map(([k,l])=>aiData[k]?(
              <div key={k} className="mb-2 last:mb-0">
                <p className="text-xs font-semibold text-purple-600 mb-0.5">{l}</p>
                <p className="text-xs text-slate-700 leading-relaxed">{aiData[k]}</p>
              </div>
            ):null)}
          </div>
        )}
      </div>
      <div className="flex justify-end gap-3 pt-3 border-t border-slate-100 mt-3">
        <button onClick={onClose} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cerrar</button>
        <button onClick={onEdit} className="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Editar entrevista</button>
      </div>
    </div>
  )
}

// Página principal de Evaluaciones
function Evaluations({ user, onPage }) {
  const [interviews, setInterviews] = useState([])
  const [patients, setPatients]     = useState([])
  const [loading, setLoading]       = useState(true)
  const [modal, setModal]           = useState(null)
  const [selected, setSelected]     = useState(null)
  const [err, setErr]               = useState('')
  const [busy, setBusy]             = useState(false)
  const [filterPatient, setFilterPatient] = useState('')
  const [searchEval, setSearchEval] = useState('')

  const load = useCallback(async () => {
    setLoading(true)
    const [ivRes, patRes] = await Promise.all([
      sb.from('initial_interviews').select('*').eq('user_id', user.id).order('created_at', { ascending: false }),
      sb.from('patients').select('id,name,age').eq('user_id', user.id).order('name')
    ])
    setInterviews(ivRes.data || [])
    setPatients(patRes.data || [])
    setLoading(false)
  }, [user.id])

  useEffect(()=>{ load() },[load])

  const openCreate = () => {
    if (!canAddPatient(role, patients.length, planExpiry)) {
      const limit = PLAN_LIMITS[role]?.maxPatients || 5
      setErr(`Tu plan ${PLAN_LIMITS[role]?.label||'Gratis'} permite hasta ${limit} pacientes. Actualiza para agregar más.`)
      return
    }
    setSelected(null); setErr(''); setModal('create')
  }
  const openEdit   = iv => { setSelected(iv); setErr(''); setModal('edit') }
  const openView   = iv => { setSelected(iv); setModal('view') }
  const openDelete = iv => { setSelected(iv); setModal('delete') }
  const close = () => { setModal(null); setSelected(null) }

  const save = async (form) => {
    if (!form.patient_id && !selected) return setErr('Debes seleccionar un paciente')
    setBusy(true); setErr('')
    const payload = { ...form, user_id: user.id }
    let error
    if (modal==='edit') {
      ;({ error } = await sb.from('initial_interviews').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', selected.id))
    } else {
      ;({ error } = await sb.from('initial_interviews').insert(payload))
    }
    if (error) setErr('Error al guardar. Intenta de nuevo.')
    else { close(); load() }
    setBusy(false)
  }

  const destroy = async () => { await sb.from('initial_interviews').delete().eq('id', selected.id); close(); load() }

  const patientName = (pid) => patients.find(p=>p.id===pid)?.name || '—'

  const filteredEvals = interviews.filter(iv => {
    const matchPatient = !filterPatient || iv.patient_id === filterPatient
    const pName = patientName(iv.patient_id).toLowerCase()
    const matchSearch = !searchEval || pName.includes(searchEval.toLowerCase())
    return matchPatient && matchSearch
  })

  const formatDate = d => d ? new Date(d).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'

  return (
    <div className="p-8 fade-in">
      {/* Header */}
      <div className="flex items-center justify-between mb-8">
        <div>
          <h2 className="text-2xl font-display font-semibold text-slate-800">Evaluaciones</h2>
          <p className="text-slate-500 text-sm mt-0.5">Entrevistas iniciales y registro clínico</p>
        </div>
        <button onClick={openCreate} className="bg-brand-500 hover:bg-brand-600 text-white font-medium px-4 py-2 rounded-lg flex items-center gap-2 text-sm transition-colors">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Nueva entrevista
        </button>
      </div>

      {/* Tarjetas de tipo de evaluación */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
        <div className="bg-white rounded-2xl border-2 border-brand-500 p-5 shadow-sm">
          <div className="flex items-center gap-3 mb-2">
            <span className="text-2xl">📝</span>
            <div>
              <p className="font-semibold text-slate-800 text-sm">Entrevista inicial</p>
              <p className="text-xs text-brand-500 font-medium">Disponible</p>
            </div>
          </div>
          <p className="text-xs text-slate-500">Evaluación estructurada en 4 bloques: problema, contexto, historia clínica y plan terapéutico.</p>
        </div>
        <div className="bg-white rounded-2xl border-2 border-brand-200 p-5 shadow-sm cursor-pointer hover:border-brand-400 transition-all" onClick={()=>onPage&&onPage('instrumentos')}>
          <div className="flex items-center gap-3 mb-2">
            <span className="text-2xl">📊</span>
            <div>
              <p className="font-semibold text-slate-800 text-sm">Instrumentos validados</p>
              <p className="text-xs text-brand-500 font-medium">Disponible</p>
            </div>
          </div>
          <p className="text-xs text-slate-500">17 instrumentos: PHQ-9, GAD-7, DASS-21, CES-D, AAQ-II, CFQ, VLQ, LSAS, STAI, PCL-5, WHODAS, GPS, NEO-FFI y más.</p>
        </div>
        <div className="bg-white rounded-2xl border-2 border-brand-200 p-5 shadow-sm cursor-pointer hover:border-brand-400 transition-all" onClick={()=>onPage&&onPage('reportes')}>
          <div className="flex items-center gap-3 mb-2">
            <span className="text-2xl">📄</span>
            <div>
              <p className="font-semibold text-slate-800 text-sm">Reportes clínicos</p>
              <p className="text-xs text-brand-500 font-medium">Disponible</p>
            </div>
          </div>
          <p className="text-xs text-slate-500">6 tipos de reporte: entrevista inicial, instrumentos, evolución, pre-post, alta terapéutica y agenda.</p>
        </div>
      </div>

      {/* Búsqueda y filtros */}
      {(patients.length > 0 || interviews.length > 0) && (
        <div className="flex flex-col sm:flex-row gap-3 mb-4">
          <div className="relative flex-1">
            <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none">
              <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <input className="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
              placeholder="Buscar por paciente o instrumento..." value={searchEval} onChange={e=>setSearchEval(e.target.value)} />
            {searchEval && <button onClick={()=>setSearchEval('')} className="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
            </button>}
          </div>
          <select className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
            value={filterPatient} onChange={e=>setFilterPatient(e.target.value)}>
            <option value="">Todos los pacientes</option>
            {patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          {(filterPatient||searchEval) && <button onClick={()=>{setFilterPatient('');setSearchEval('')}} className="text-xs text-slate-400 hover:text-slate-600 whitespace-nowrap">✕ Limpiar</button>}
        </div>
      )}

      {/* Lista de entrevistas */}
      {loading ? (
        <div className="text-center py-16 text-slate-400">Cargando...</div>
      ) : filteredEvals.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-200 p-14 text-center">
          <span className="text-5xl block mb-4">📝</span>
          <p className="text-slate-500 font-medium">Sin entrevistas todavía</p>
          <p className="text-slate-400 text-sm mt-1">Presiona "Nueva entrevista" para comenzar la evaluación de un paciente</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{['Paciente','Tipo','Estado','Fecha','Próxima sesión',''].map((h,i)=>(
                <th key={i} className={`px-5 py-3 font-medium text-slate-500 ${i===5?'text-right':'text-left'}`}>{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {filteredEvals.map(iv=>(
                <tr key={iv.id} className="hover:bg-slate-50 transition-colors">
                  <td className="px-5 py-3.5">
                    <button onClick={()=>openView(iv)} className="font-medium text-brand-600 hover:text-brand-800 hover:underline text-left">{patientName(iv.patient_id)}</button>
                  </td>
                  <td className="px-5 py-3.5">
                    <span className="flex items-center gap-1.5 text-slate-600"><span>📝</span> Entrevista inicial</span>
                  </td>
                  <td className="px-5 py-3.5">
                    <span className={`text-xs font-medium px-2.5 py-1 rounded-full ${STATUS_INT_COLORS[iv.status]||STATUS_INT_COLORS.borrador}`}>
                      {STATUS_INT_LABELS[iv.status]||'Borrador'}
                    </span>
                  </td>
                  <td className="px-5 py-3.5 text-slate-500 text-xs">{formatDate(iv.created_at)}</td>
                  <td className="px-5 py-3.5 text-slate-500 text-xs">{iv.next_session_date ? formatDate(iv.next_session_date) : '—'}</td>
                  <td className="px-5 py-3.5 text-right space-x-1">
                    <button onClick={()=>openEdit(iv)} className="text-brand-500 hover:text-brand-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-brand-50 transition-colors">Editar</button>
                    <button onClick={()=>openDelete(iv)} className="text-red-500 hover:text-red-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">Eliminar</button>
                  </td>
                </tr>
              ))}

// ── Estadísticas mensuales ────────────────────────────────
function MonthlyStats({ user }) {
  const [data, setData] = useState(null)

  useEffect(()=>{
    const firstDay = new Date()
    firstDay.setDate(1)
    firstDay.setHours(0,0,0,0)
    const firstISO = firstDay.toISOString().slice(0,10)

    Promise.all([
      sb.from('sessions').select('id,patient_id,created_at,interventions').eq('user_id',user.id).gte('session_date',firstISO),
      sb.from('instrument_results').select('id,instrument_name,created_at').eq('user_id',user.id).gte('created_at',firstDay.toISOString()),
      sb.from('appointments').select('id,status').eq('user_id',user.id).gte('date',firstISO),
      sb.from('payments').select('amount,status').eq('user_id',user.id).gte('payment_date',firstISO)
    ]).then(([sess, instr, appts, pays])=>{
      const sessions = sess.data||[]
      const instruments = instr.data||[]
      const appointments = appts.data||[]
      const payments = pays.data||[]

      // Instrumentos más usados
      const instrCount = instruments.reduce((acc,r)=>{
        acc[r.instrument_name]=(acc[r.instrument_name]||0)+1; return acc
      },{})
      const topInstr = Object.entries(instrCount).sort((a,b)=>b[1]-a[1]).slice(0,3)

      // Pacientes únicos atendidos
      const uniquePatients = new Set(sessions.map(s=>s.patient_id)).size

      // Ingresos del mes
      const income = payments.filter(p=>p.status==='pagado').reduce((s,p)=>s+parseFloat(p.amount||0),0)

      setData({
        sessions: sessions.length,
        uniquePatients,
        instruments: instruments.length,
        topInstr,
        apptsDone: appointments.filter(a=>a.status==='realizada').length,
        income
      })
    })
  },[user.id])

  if (!data) return <div className="text-slate-400 text-sm text-center py-4">Cargando estadísticas...</div>

  const month = new Date().toLocaleDateString('es-EC',{month:'long',year:'numeric'})

  return (
    <div>
      <p className="text-xs text-slate-400 mb-4 capitalize">{month}</p>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-5">
        {[
          { label:'Sesiones realizadas', value:data.sessions, icon:'📋', color:'text-brand-600' },
          { label:'Pacientes atendidos', value:data.uniquePatients, icon:'👤', color:'text-green-600' },
          { label:'Instrumentos aplicados', value:data.instruments, icon:'📊', color:'text-purple-600' },
          { label:'Ingresos cobrados', value:`$${data.income.toFixed(2)}`, icon:'💰', color:'text-emerald-600' },
        ].map((s,i)=>(
          <div key={i} className="text-center">
            <div className="text-2xl mb-1">{s.icon}</div>
            <p className={`text-2xl font-display font-bold ${s.color}`}>{s.value}</p>
            <p className="text-xs text-slate-400 mt-0.5">{s.label}</p>
          </div>
        ))}
      </div>
      {data.topInstr.length > 0 && (
        <div className="border-t border-slate-100 pt-4">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Instrumentos más usados este mes</p>
          <div className="space-y-2">
            {data.topInstr.map(([name, count])=>(
              <div key={name} className="flex items-center gap-3">
                <span className="text-xs text-slate-600 flex-1 truncate">{name}</span>
                <div className="flex items-center gap-2">
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden" style={{width:'80px'}}>
                    <div className="h-full bg-brand-400 rounded-full" style={{width:`${(count/data.instruments)*100}%`}}/>
                  </div>
                  <span className="text-xs font-semibold text-slate-600 w-4">{count}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  )
}

          <p className="text-xs text-slate-400 mt-0.5">{s.session_date ? new Date(s.session_date+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'}) : '—'} · {s.session_type}</p>
        </div>
        <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${SESSION_STATUS_COLORS[s.status]||SESSION_STATUS_COLORS.realizada}`}>
          {SESSION_STATUS_LABELS[s.status]||'Realizada'}
        </span>
      </div>

      {/* Mood bars */}
      {(s.mood_start || s.mood_end) && (
        <div className="bg-slate-50 rounded-xl p-4 mb-5">
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Estado emocional</p>
          <MoodBar label="Al inicio" value={s.mood_start} />
          <MoodBar label="Al cierre" value={s.mood_end} />
          {s.mood_start && s.mood_end && (
            <p className={`text-xs font-medium mt-2 ${s.mood_end>s.mood_start?'text-green-600':s.mood_end<s.mood_start?'text-red-500':'text-slate-500'}`}>
              {s.mood_end>s.mood_start ? `↑ Mejoró ${s.mood_end-s.mood_start} punto${s.mood_end-s.mood_start!==1?'s':''} durante la sesión`
               : s.mood_end<s.mood_start ? `↓ Bajó ${s.mood_start-s.mood_end} punto${s.mood_start-s.mood_end!==1?'s':''} durante la sesión`
               : '→ Sin cambio en el estado emocional'}
            </p>
          )}
        </div>
      )}

      <div className="max-h-72 overflow-y-auto pr-1">
        <Field label="Contenido de la sesión" value={s.content} />
        <Field label="Intervenciones aplicadas" value={s.interventions} />
        <Field label="Respuesta del paciente" value={s.patient_response} />
        <Field label="Tareas entre sesiones" value={s.homework} />
        <Field label="Objetivos próxima sesión" value={s.next_session_goals} />
      </div>

      <div className="flex justify-end gap-3 mt-5 pt-4 border-t border-slate-100">
        <button onClick={onClose} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cerrar</button>
        <button onClick={onEdit} className="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Editar sesión</button>
      </div>
    </div>
  )
}

function Sessions({ user }) {
  const [sessions, setSessions]   = useState([])
  const [patients, setPatients]   = useState([])
  const [loading, setLoading]     = useState(true)
  const [modal, setModal]         = useState(null)
  const [selected, setSelected]   = useState(null)
  const [err, setErr]             = useState('')
  const [busy, setBusy]           = useState(false)
  const [filterPatient, setFilterPatient] = useState('')
  const [searchSession, setSearchSession] = useState('')

  const load = useCallback(async () => {
    setLoading(true)
    const [sesRes, patRes] = await Promise.all([
      sb.from('sessions').select('*').eq('user_id', user.id).order('session_date', { ascending: false }),
      sb.from('patients').select('id,name,age').eq('user_id', user.id).order('name')
    ])
    setSessions(sesRes.data || [])
    setPatients(patRes.data || [])
    setLoading(false)
  }, [user.id])

  useEffect(()=>{ load() },[load])

  const openCreate = () => { setSelected(null); setErr(''); setModal('create') }
  const openEdit   = s  => { setSelected(s); setErr(''); setModal('edit') }
  const openView   = s  => { setSelected(s); setModal('view') }
  const openDelete = s  => { setSelected(s); setModal('delete') }
  const close = () => { setModal(null); setSelected(null) }

  const save = async (form) => {
    if (!form.patient_id && !selected) return setErr('Debes seleccionar un paciente')
    setBusy(true); setErr('')
    const payload = {
      user_id: user.id,
      patient_id: form.patient_id || selected?.patient_id,
      session_number: form.session_number ? parseInt(form.session_number) : null,
      session_date: form.session_date || null,
      session_type: form.session_type || 'individual',
      content: form.content || null,
      interventions: form.interventions || null,
      patient_response: form.patient_response || null,
      homework: form.homework || null,
      next_session_goals: form.next_session_goals || null,
      mood_start: form.mood_start || null,
      mood_end: form.mood_end || null,
      status: form.status || 'realizada',
    }
    let error
    if (modal==='edit') {
      ;({ error } = await sb.from('sessions').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', selected.id))
    } else {
      ;({ error } = await sb.from('sessions').insert(payload))
    }
    if (error) setErr('Error al guardar. Intenta de nuevo.')
    else { close(); load() }
    setBusy(false)
  }

  const destroy = async () => { await sb.from('sessions').delete().eq('id', selected.id); close(); load() }
  const patientName = (pid) => patients.find(p=>p.id===pid)?.name || '—'
  const filteredSessions = sessions.filter(s => {
    const matchPatient = !filterPatient || s.patient_id === filterPatient
    const q = searchSession.toLowerCase()
    const matchSearch = !searchSession ||
      patientName(s.patient_id).toLowerCase().includes(q) ||
      (s.content||'').toLowerCase().includes(q) ||
      (s.interventions||'').toLowerCase().includes(q)
    return matchPatient && matchSearch
  })
  const formatDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'

  // Estadísticas rápidas
  const stats = {
    total: sessions.length,
    realized: sessions.filter(s=>s.status==='realizada').length,
    avgMoodStart: sessions.filter(s=>s.mood_start).length ? (sessions.filter(s=>s.mood_start).reduce((a,s)=>a+s.mood_start,0)/sessions.filter(s=>s.mood_start).length).toFixed(1) : null,
    avgMoodEnd: sessions.filter(s=>s.mood_end).length ? (sessions.filter(s=>s.mood_end).reduce((a,s)=>a+s.mood_end,0)/sessions.filter(s=>s.mood_end).length).toFixed(1) : null,
  }

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h2 className="text-2xl font-display font-semibold text-slate-800">Sesiones</h2>
          <p className="text-slate-500 text-sm mt-0.5">Seguimiento y registro de sesiones terapéuticas</p>
        </div>
        <button onClick={openCreate} className="bg-brand-500 hover:bg-brand-600 text-white font-medium px-4 py-2 rounded-lg flex items-center gap-2 text-sm transition-colors">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
          Nueva sesión
        </button>
      </div>

      {/* Stats rápidas */}
      {sessions.length > 0 && (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
          {[
            { label:'Sesiones totales', value: stats.total, color:'text-brand-600' },
            { label:'Realizadas', value: stats.realized, color:'text-green-600' },
            { label:'Ánimo promedio inicio', value: stats.avgMoodStart ? `${stats.avgMoodStart}/10` : '—', color:'text-slate-700' },
            { label:'Ánimo promedio cierre', value: stats.avgMoodEnd ? `${stats.avgMoodEnd}/10` : '—', color:'text-slate-700' },
          ].map((s,i)=>(
            <div key={i} className="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
              <p className="text-xs text-slate-500 mb-1">{s.label}</p>
              <p className={`text-2xl font-display font-bold ${s.color}`}>{s.value}</p>
            </div>
          ))}
        </div>
      )}

      {/* Búsqueda y filtro */}
      {(patients.length > 0 || sessions.length > 0) && (
        <div className="flex flex-col sm:flex-row gap-3 mb-4">
          <div className="relative flex-1">
            <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none">
              <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <input className="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
              placeholder="Buscar por paciente, contenido o intervención..." value={searchSession} onChange={e=>setSearchSession(e.target.value)} />
            {searchSession && <button onClick={()=>setSearchSession('')} className="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
            </button>}
          </div>
          <select className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
            value={filterPatient} onChange={e=>setFilterPatient(e.target.value)}>
            <option value="">Todos los pacientes</option>
            {patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          {(filterPatient||searchSession) && <button onClick={()=>{setFilterPatient('');setSearchSession('')}} className="text-xs text-slate-400 hover:text-slate-600 whitespace-nowrap">✕ Limpiar</button>}
        </div>
      )}

      {/* Lista */}
      {loading ? (
        <div className="text-center py-16 text-slate-400">Cargando...</div>
      ) : filteredSessions.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-200 p-14 text-center">
          <span className="text-5xl block mb-4">🗓️</span>
          <p className="text-slate-500 font-medium">Sin sesiones registradas</p>
          <p className="text-slate-400 text-sm mt-1">Presiona "Nueva sesión" para registrar el trabajo terapéutico</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{['Paciente','Sesión','Fecha','Tipo','Ánimo','Estado',''].map((h,i)=>(
                <th key={i} className={`px-4 py-3 font-medium text-slate-500 ${i===6?'text-right':'text-left'}`}>{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {filteredSessions.map(s=>(
                <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                  <td className="px-4 py-3.5">
                    <button onClick={()=>openView(s)} className="font-medium text-brand-600 hover:text-brand-800 hover:underline text-left">{patientName(s.patient_id)}</button>
                  </td>
                  <td className="px-4 py-3.5 text-slate-600 text-center">#{s.session_number||'—'}</td>
                  <td className="px-4 py-3.5 text-slate-500 text-xs">{formatDate(s.session_date)}</td>
                  <td className="px-4 py-3.5 text-slate-600 capitalize">{s.session_type||'—'}</td>
                  <td className="px-4 py-3.5">
                    {s.mood_start && s.mood_end ? (
                      <span className={`text-xs font-medium ${s.mood_end>s.mood_start?'text-green-600':s.mood_end<s.mood_start?'text-red-500':'text-slate-500'}`}>
                        {s.mood_start}→{s.mood_end} {s.mood_end>s.mood_start?'↑':s.mood_end<s.mood_start?'↓':'→'}
                      </span>
                    ) : <span className="text-slate-300 text-xs">—</span>}
                  </td>
                  <td className="px-4 py-3.5">
                    <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${SESSION_STATUS_COLORS[s.status]||SESSION_STATUS_COLORS.realizada}`}>
                      {SESSION_STATUS_LABELS[s.status]||'Realizada'}
                    </span>
                  </td>
                  <td className="px-4 py-3.5 text-right space-x-1">
                    <button onClick={()=>openEdit(s)} className="text-brand-500 hover:text-brand-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-brand-50 transition-colors">Editar</button>
                    <button onClick={()=>openDelete(s)} className="text-red-500 hover:text-red-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">Eliminar</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {modal==='view' && selected && (
        <Modal title="Detalle de sesión" onClose={close} wide>
          <SessionDetail session={selected} patientName={patientName(selected.patient_id)} onEdit={()=>setModal('edit')} onClose={close} />
        </Modal>
      )}
      {(modal==='create'||modal==='edit') && (
        <Modal title={modal==='edit'?'Editar sesión':'Nueva sesión'} onClose={close} wide>
          <SessionForm initial={modal==='edit'?selected:null} patients={patients} onSave={save} onClose={close} busy={busy} err={err} />
        </Modal>
      )}
      {modal==='delete' && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-sm p-6 text-center shadow-2xl fade-in">
            <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg className="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <h3 className="text-lg font-semibold text-slate-800 mb-1">¿Eliminar sesión?</h3>
            <p className="text-slate-500 text-sm mb-6">Se eliminará la sesión #{selected?.session_number} de <strong>{patientName(selected?.patient_id)}</strong>. Esta acción no se puede deshacer.</p>
            <div className="flex gap-3">
              <button onClick={close} className="flex-1 px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
              <button onClick={destroy} className="flex-1 px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-medium">Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

const APPT_STATUS_LABELS = { programada:'Programada', realizada:'Realizada', cancelada:'Cancelada', reprogramada:'Reprogramada' }
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
const DAYS_ES   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']

function CalendarView({ appointments, patients, onDayClick, selectedDate }) {
  const [calDate, setCalDate] = useState(new Date())
  const year = calDate.getFullYear(), month = calDate.getMonth()
  const firstDay = new Date(year, month, 1).getDay()
  const daysInMonth = new Date(year, month+1, 0).getDate()
  const patientName = pid => patients.find(p=>p.id===pid)?.name || '?'

  const apptsByDay = {}
  appointments.forEach(a => {
    if (!a.date) return
    const d = a.date.slice(0,10)
    const [y,m] = d.split('-').map(Number)
    if (y===year && m-1===month) {
      const day = parseInt(d.split('-')[2])
      if (!apptsByDay[day]) apptsByDay[day] = []
      apptsByDay[day].push(a)
    }
  })

  const today = new Date()
  const cells = []
  for (let i=0; i<firstDay; i++) cells.push(null)
  for (let d=1; d<=daysInMonth; d++) cells.push(d)

  return (
    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
        <button onClick={()=>setCalDate(new Date(year,month-1,1))} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
        </button>
        <p className="font-semibold text-slate-800">{MONTHS_ES[month]} {year}</p>
        <button onClick={()=>setCalDate(new Date(year,month+1,1))} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
      {/* Days header */}
      <div className="grid grid-cols-7 border-b border-slate-100">
        {DAYS_ES.map(d=><div key={d} className="text-center text-xs font-semibold text-slate-400 py-2">{d}</div>)}
      </div>
      {/* Grid */}
      <div className="grid grid-cols-7">
        {cells.map((day,i)=>{
          if (!day) return <div key={`e${i}`} className="h-20 border-b border-r border-slate-50"/>
          const isToday = day===today.getDate() && month===today.getMonth() && year===today.getFullYear()
          const dayAppts = apptsByDay[day] || []
          return (
            <div key={day} onClick={()=>onDayClick && onDayClick(`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`)}
              className={`h-20 border-b border-r border-slate-50 p-1.5 cursor-pointer hover:bg-slate-50 transition-colors ${isToday?'bg-brand-50':''}`}>
              <div className={`text-xs font-semibold mb-1 w-6 h-6 flex items-center justify-center rounded-full ${isToday?'bg-brand-500 text-white':'text-slate-600'}`}>{day}</div>
              <div className="space-y-0.5 overflow-hidden">
                {dayAppts.slice(0,2).map(a=>(
                  <div key={a.id} className={`text-xs px-1 py-0.5 rounded truncate font-medium ${APPT_STATUS_COLORS[a.status]||'bg-brand-100 text-brand-700'}`}>
                    {a.time ? a.time.slice(0,5)+' ' : ''}{patientName(a.patient_id)}
                  </div>
                ))}
                {dayAppts.length>2 && <div className="text-xs text-slate-400">+{dayAppts.length-2} más</div>}
              </div>
            </div>
          )
        })}
      </div>
    </div>
  )
}

function Appointments({ user }) {
  const [appointments, setAppointments] = useState([])
  const [patients, setPatients]         = useState([])
  const [loading, setLoading]           = useState(true)
  const [modal, setModal]               = useState(null)
  const [selected, setSelected]         = useState(null)
  const [err, setErr]                   = useState('')
  const [busy, setBusy]                 = useState(false)
  const [view, setView]                 = useState('list')
  const [prefillDate, setPrefillDate]   = useState('')

  const load = useCallback(async () => {

      sb.from('patients').select('id,name,age').eq('user_id', user.id).order('name')

    setPatients(patRes.data || [])
    setLoading(false)

  useEffect(()=>{ load() },[load])

  const openCreate = (date='') => { setSelected(null); setErr(''); setPrefillDate(date); setModal('create') }
  const openEdit   = a => { setSelected(a); setErr(''); setModal('edit') }
  const openDelete = a => { setSelected(a); setModal('delete') }
  const close = () => { setModal(null); setSelected(null) }

  const save = async (form) => {
    if (!form.patient_id && !selected) return setErr('Debes seleccionar un paciente')
    if (!form.date) return setErr('La fecha es requerida')
    setBusy(true); setErr('')
    const payload = { user_id:user.id, patient_id:form.patient_id||selected?.patient_id, title:form.title||null, date:form.date, time:form.time||null, duration_min:form.duration_min||50, modality:form.modality||'presencial', status:form.status||'programada', notes:form.notes||null }
    let error
    if (modal==='edit') { ;({ error } = await sb.from('appointments').update({ ...payload, updated_at:new Date().toISOString() }).eq('id', selected.id)) }
    else { ;({ error } = await sb.from('appointments').insert(payload)) }
    if (error) setErr('Error al guardar. Intenta de nuevo.')
    else { close(); load() }
    setBusy(false)
  }

  const destroy = async () => { await sb.from('appointments').delete().eq('id', selected.id); close(); load() }

      </div>

          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            {upcoming.map(a=>(
              <div key={a.id} className="bg-brand-50 border border-brand-200 rounded-xl p-4">
                <p className="font-semibold text-brand-800 text-sm">{patientName(a.patient_id)}</p>
                <p className="text-brand-600 text-xs mt-0.5">{formatDate(a.date)}{a.time ? ' · '+a.time.slice(0,5) : ''}</p>
                <p className="text-brand-500 text-xs">{a.duration_min} min · {a.modality}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {loading ? <div className="text-center py-16 text-slate-400">Cargando...</div>
      : view==='calendar' ? (
        <CalendarView appointments={appointments} patients={patients} onDayClick={d=>openCreate(d)} selectedDate={null} />
      ) : appointments.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-200 p-14 text-center">
          <span className="text-5xl block mb-4">🗓️</span>
          <p className="text-slate-500 font-medium">Sin citas agendadas</p>
          <p className="text-slate-400 text-sm mt-1">Presiona "Nueva cita" para programar una sesión</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{['Paciente','Fecha','Hora','Duración','Modalidad','Estado',''].map((h,i)=>(
                <th key={i} className={`px-4 py-3 font-medium text-slate-500 ${i===6?'text-right':'text-left'}`}>{h}</th>

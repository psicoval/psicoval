            <td>${a.modality||'—'}</td>
            <td>${a.status||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="footer"><p>Reporte generado por Psicoval · ${profName} · ${now}</p></div>`
  }

  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Psicoval — Reporte</title>${styles}</head><body>${header}${body}</body></html>`
}

function ReportsPage({ user, role, planExpiry }) {
  const [patients, setPatients]           = useState([])
  const [sessions, setSessions]           = useState([])
  const [appointments, setAppointments]   = useState([])
  const [interviews, setInterviews]       = useState([])
  const [instrResults, setInstrResults]   = useState([])
  const [profile, setProfile]             = useState(null)
  const [loading, setLoading]             = useState(true)
  const [selectedReport, setSelectedReport] = useState(null)
  const [selectedPatient, setSelectedPatient] = useState('')
  const [selectedResult1, setSelectedResult1] = useState('')
  const [selectedResult2, setSelectedResult2] = useState('')
  const [selectedResult3, setSelectedResult3] = useState('')
  const [generating, setGenerating]       = useState(false)

  useEffect(()=>{
    Promise.all([
      sb.from('patients').select('*').eq('user_id',user.id).order('name'),
      sb.from('sessions').select('*').eq('user_id',user.id),
      sb.from('appointments').select('*').eq('user_id',user.id).order('date'),
      sb.from('initial_interviews').select('*').eq('user_id',user.id),
      sb.from('instrument_results').select('*').eq('user_id',user.id).order('applied_at',{ascending:false}),
      sb.from('psychologist_profiles').select('*').eq('user_id',user.id).single()
    ]).then(([p,s,a,iv,ir,pr])=>{
      setPatients(p.data||[])
      setSessions(s.data||[])
      setAppointments(a.data||[])
      setInterviews(iv.data||[])
      setInstrResults(ir.data||[])
      setProfile(pr.data||null)
      setLoading(false)
    })
  },[user.id])

  const patientName = pid => patients.find(p=>p.id===pid)?.name||'—'

  const generateReport = (type) => {
    setGenerating(true)
    const patient   = patients.find(p=>p.id===selectedPatient)
    const patInstr  = instrResults.filter(r=>r.patient_id===selectedPatient)
    const apptWithNames = appointments.map(a=>({...a, _patientName:patientName(a.patient_id)}))
    const patInterviews = interviews.filter(iv=>iv.patient_id===selectedPatient)

    let compareResult = null
    if (type==='prepost' && selectedResult1) {
      const r1 = instrResults.find(r=>r.id===selectedResult1)
      const r2 = selectedResult2 ? instrResults.find(r=>r.id===selectedResult2) : null
      const r3 = selectedResult3 ? instrResults.find(r=>r.id===selectedResult3) : null
      compareResult = { patient, instrument:r1?.instrument_name, result1:r1, result2:r2, result3:r3 }
    }

    const html = generateReportHTML(type, {
      patient, profile,
      interviews: patInterviews,
      instrumentResults: patInstr,
      sessions, appointments: apptWithNames,
      compareResult
    })

    const w = window.open('','_blank')
    if(w) {
      w.document.write(html)
      w.document.close()
      setTimeout(()=>w.print(), 500)
    }
    setGenerating(false)
  }

  const patientInstrResults = instrResults.filter(r=>r.patient_id===selectedPatient)
  const groups = [...new Set(REPORT_TYPES.map(r=>r.group))]

  if(loading) return <div className="p-8 text-slate-400 text-sm">Cargando...</div>

  return (
    <div className="p-8 fade-in">
      <div className="mb-8">
        <h2 className="text-2xl font-display font-semibold text-slate-800">Reportes</h2>
        <p className="text-slate-500 text-sm mt-0.5">Genera informes clínicos y administrativos listos para imprimir o guardar como PDF</p>
      </div>
      {!canUseReports(role, planExpiry) && (
        <UpgradeBanner
          feature="Reportes clínicos"
          message="Los reportes en PDF están disponibles desde el plan Básico ($6/mes). Incluye 6 tipos de informe profesional."
        />
      )}
      {canUseReports(role, planExpiry) && <>

      {/* Selector de paciente (para reportes clínicos) */}
      <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm mb-6">
        <p className="text-sm font-semibold text-slate-700 mb-3">Selecciona el paciente para los reportes clínicos</p>
        <select className="w-full sm:w-96 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
          value={selectedPatient} onChange={e=>setSelectedPatient(e.target.value)}>
          <option value="">— Seleccionar paciente —</option>
          {patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        {selectedPatient && (
          <p className="text-xs text-green-600 mt-2">✓ Paciente seleccionado: <strong>{patientName(selectedPatient)}</strong></p>
        )}
      </div>

      {groups.map(group=>(
        <div key={group} className="mb-8">
          <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">{group}</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {REPORT_TYPES.filter(r=>r.group===group).map(rt=>(
              <div key={rt.key} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:border-brand-300 transition-all">
                <div className="flex items-start gap-3 mb-3">
                  <span className="text-2xl">{rt.icon}</span>
                  <div>
                    <p className="font-semibold text-slate-800 text-sm">{rt.title}</p>
                    <p className="text-xs text-slate-500 leading-relaxed mt-0.5">{rt.desc}</p>
                  </div>
                </div>

                {/* Campos extra para pre-post */}
                {rt.key==='prepost' && selectedPatient && patientInstrResults.length >= 1 && (
                  <div className="space-y-2 mb-3">
                    <p className="text-xs font-semibold text-slate-500 mb-1">Selecciona hasta 3 aplicaciones:</p>
                    <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-brand-500"
                      value={selectedResult1} onChange={e=>setSelectedResult1(e.target.value)}>
                      <option value="">— Inicio / PRE * —</option>
                      {patientInstrResults.map(r=><option key={r.id} value={r.id}>{r.instrument_name} ({r.applied_at})</option>)}
                    </select>
                    <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-brand-500"
                      value={selectedResult2} onChange={e=>setSelectedResult2(e.target.value)}>
                      <option value="">— Seguimiento / INTERMEDIO —</option>
                      {patientInstrResults.map(r=><option key={r.id} value={r.id}>{r.instrument_name} ({r.applied_at})</option>)}
                    </select>
                    <select className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-brand-500"
                      value={selectedResult3} onChange={e=>setSelectedResult3(e.target.value)}>
                      <option value="">— Cierre / POST —</option>
                      {patientInstrResults.map(r=><option key={r.id} value={r.id}>{r.instrument_name} ({r.applied_at})</option>)}
                    </select>
                    <p className="text-xs text-slate-400">* Requerido. Intermedio y cierre son opcionales.</p>
                  </div>
                )}

                <button
                  onClick={()=>generateReport(rt.key)}
                  disabled={generating || (rt.group==='Clínicos' && !selectedPatient) || (rt.key==='prepost' && !selectedResult1)}
                  className="w-full py-2 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-xs font-medium transition-colors disabled:opacity-40 flex items-center justify-center gap-1.5">
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                  Generar reporte
                </button>
              </div>
            ))}
          </div>
        </div>
      ))}

      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex gap-3">
        <span className="text-amber-500 flex-shrink-0">💡</span>
        <p className="text-xs text-amber-700">Los reportes se abren en una nueva ventana lista para imprimir. Usa <strong>Ctrl+P</strong> (o Cmd+P en Mac) y selecciona "Guardar como PDF" para guardar el archivo.</p>
      </div>
      </>}
    </div>
  )
}



// ── FINANZAS ──────────────────────────────────────────────
const PAYMENT_METHODS = ['Efectivo','Transferencia','Tarjeta','Cheque','Otro']
const EXPENSE_CATEGORIES = ['Arriendo consultorio','Servicios básicos','Material de oficina','Software y tecnología','Capacitación','Marketing','Equipamiento','Seguros','Impuestos','Otros']

const EMPTY_PAYMENT = { patient_id:'', session_id:'', amount:'', method:'Efectivo', status:'pagado', concept:'Sesión terapéutica', payment_date:'', notes:'' }
const EMPTY_EXPENSE = { amount:'', category:'', description:'', expense_date:'', recurring:false }

function FinancesPage({ user }) {
  const [tab, setTab] = useState('dashboard')
  const [payments, setPayments]   = useState([])
  const [expenses, setExpenses]   = useState([])
  const [patients, setPatients]   = useState([])
  const [sessions, setSessions]   = useState([])
  const [loading, setLoading]     = useState(true)
  const [modal, setModal]         = useState(null)
  const [selected, setSelected]   = useState(null)
  const [form, setForm]           = useState(EMPTY_PAYMENT)
  const [expForm, setExpForm]     = useState(EMPTY_EXPENSE)
  const [busy, setBusy]           = useState(false)
  const [err, setErr]             = useState('')
  const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0,7))

  const load = useCallback(async () => {
    setLoading(true)
    const [py, ex, pt, se] = await Promise.all([
      sb.from('payments').select('*').eq('user_id', user.id).order('payment_date', { ascending: false }),
      sb.from('expenses').select('*').eq('user_id', user.id).order('expense_date', { ascending: false }),
      sb.from('patients').select('id,name').eq('user_id', user.id).order('name'),
      sb.from('sessions').select('id,session_number,session_date,patient_id').eq('user_id', user.id).order('session_date', { ascending: false })
    ])
    setPayments(py.data||[])
    setExpenses(ex.data||[])
    setPatients(pt.data||[])
    setSessions(se.data||[])
    setLoading(false)
  }, [user.id])

  useEffect(()=>{ load() },[load])

  const patientName = pid => patients.find(p=>p.id===pid)?.name||'—'
  const formatDate  = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'
  const fmt = n => `$${parseFloat(n||0).toFixed(2)}`
  const f = (k,v) => setForm(p=>({...p,[k]:v}))
  const ef = (k,v) => setExpForm(p=>({...p,[k]:v}))

  // ── Filtrar por mes ──────────────────────────────────────
  const monthPayments = payments.filter(p => p.payment_date?.slice(0,7) === filterMonth)
  const monthExpenses = expenses.filter(e => e.expense_date?.slice(0,7) === filterMonth)
  const totalIncome   = monthPayments.filter(p=>p.status==='pagado').reduce((s,p)=>s+parseFloat(p.amount||0),0)
  const totalPending  = monthPayments.filter(p=>p.status==='pendiente').reduce((s,p)=>s+parseFloat(p.amount||0),0)
  const totalExpenses = monthExpenses.reduce((s,e)=>s+parseFloat(e.amount||0),0)
  const balance       = totalIncome - totalExpenses

  // Pacientes con deuda
  const debtors = patients.map(p => {
    const debt = payments.filter(py=>py.patient_id===p.id && py.status==='pendiente').reduce((s,py)=>s+parseFloat(py.amount||0),0)
    return { ...p, debt }
  }).filter(p=>p.debt>0).sort((a,b)=>b.debt-a.debt)

  // Ingresos por mes (últimos 6)
  const last6 = Array.from({length:6},(_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-i)
    const key = d.toISOString().slice(0,7)
    const label = d.toLocaleDateString('es-EC',{month:'short',year:'2-digit'})
    const inc = payments.filter(p=>p.payment_date?.slice(0,7)===key && p.status==='pagado').reduce((s,p)=>s+parseFloat(p.amount||0),0)
    const exp = expenses.filter(e=>e.expense_date?.slice(0,7)===key).reduce((s,e)=>s+parseFloat(e.amount||0),0)
    return { key, label, inc, exp }
  }).reverse()

  const maxVal = Math.max(...last6.map(m=>Math.max(m.inc,m.exp)), 1)

  // ── Guardar cobro ────────────────────────────────────────
  const savePayment = async e => {
    e.preventDefault()
    if (!form.patient_id) return setErr('Selecciona un paciente')
    if (!form.amount || parseFloat(form.amount)<=0) return setErr('Ingresa un monto válido')
    setBusy(true); setErr('')
    const payload = { user_id:user.id, patient_id:form.patient_id, session_id:form.session_id||null, amount:parseFloat(form.amount), method:form.method, status:form.status, concept:form.concept||null, payment_date:form.payment_date||new Date().toISOString().slice(0,10), notes:form.notes||null }
    let error
    if (modal==='edit-payment') { ;({ error } = await sb.from('payments').update(payload).eq('id', selected.id)) }
    else { ;({ error } = await sb.from('payments').insert(payload)) }
    if (error) setErr('Error al guardar.')
    else { setModal(null); setSelected(null); setForm(EMPTY_PAYMENT); load() }
    setBusy(false)
  }

  // ── Guardar gasto ────────────────────────────────────────
  const saveExpense = async e => {
    e.preventDefault()
    if (!expForm.amount || parseFloat(expForm.amount)<=0) return setErr('Ingresa un monto válido')
    if (!expForm.category) return setErr('Selecciona una categoría')
    setBusy(true); setErr('')
    const payload = { user_id:user.id, amount:parseFloat(expForm.amount), category:expForm.category, description:expForm.description||null, expense_date:expForm.expense_date||new Date().toISOString().slice(0,10), recurring:expForm.recurring||false }
    let error
    if (modal==='edit-expense') { ;({ error } = await sb.from('expenses').update(payload).eq('id', selected.id)) }
    else { ;({ error } = await sb.from('expenses').insert(payload)) }
    if (error) setErr('Error al guardar.')
    else { setModal(null); setSelected(null); setExpForm(EMPTY_EXPENSE); load() }
    setBusy(false)
  }

  const deletePayment = async id => { await sb.from('payments').delete().eq('id',id); load() }
  const deleteExpense = async id => { await sb.from('expenses').delete().eq('id',id); load() }

  const openPayment = (p=null) => {
    if(p) { setSelected(p); setForm({patient_id:p.patient_id,session_id:p.session_id||'',amount:p.amount,method:p.method,status:p.status,concept:p.concept||'',payment_date:p.payment_date||'',notes:p.notes||''}); setModal('edit-payment') }
    else { setSelected(null); setForm(EMPTY_PAYMENT); setModal('new-payment') }
    setErr('')
  }
  const openExpense = (e=null) => {
    if(e) { setSelected(e); setExpForm({amount:e.amount,category:e.category,description:e.description||'',expense_date:e.expense_date||'',recurring:e.recurring||false}); setModal('edit-expense') }
    else { setSelected(null); setExpForm(EMPTY_EXPENSE); setModal('new-expense') }
    setErr('')
  }

  const TABS = [{id:'dashboard',label:'Dashboard',icon:'📊'},{id:'cobros',label:'Cobros',icon:'💰'},{id:'gastos',label:'Gastos',icon:'📤'}]

  return (
    <div className="p-4 md:p-8 fade-in">
      {/* Header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-xl md:text-2xl font-display font-semibold text-slate-800">Finanzas</h2>
          <p className="text-slate-500 text-sm mt-0.5">Control de ingresos, gastos y balance del consultorio</p>
        </div>
        <div className="flex gap-2">
          <button onClick={()=>openPayment()} className="bg-green-500 hover:bg-green-600 text-white font-medium px-3 py-2 rounded-lg flex items-center gap-1.5 text-sm transition-colors">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            Cobro
          </button>
          <button onClick={()=>openExpense()} className="bg-red-500 hover:bg-red-600 text-white font-medium px-3 py-2 rounded-lg flex items-center gap-1.5 text-sm transition-colors">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            Gasto
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 bg-slate-100 rounded-xl p-1 mb-6">
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-sm font-medium transition-colors ${tab===t.id?'bg-white text-slate-800 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
            <span>{t.icon}</span><span className="hidden sm:inline">{t.label}</span>
          </button>
        ))}
      </div>

      {loading ? <div className="text-center py-16 text-slate-400">Cargando...</div> : <>

      {/* ── DASHBOARD TAB ── */}
      {tab==='dashboard' && (
        <div className="space-y-6">
          {/* Filtro mes */}
          <div className="flex items-center gap-3">
            <label className="text-sm text-slate-500 font-medium">Mes:</label>
            <input type="month" className="border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
              value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} />
          </div>

          {/* Stats principales */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            {[
              { label:'Ingresos del mes', value:fmt(totalIncome), color:'text-green-600', bg:'bg-green-50', border:'border-green-200', icon:'💰' },
              { label:'Gastos del mes', value:fmt(totalExpenses), color:'text-red-600', bg:'bg-red-50', border:'border-red-200', icon:'📤' },
              { label:'Balance neto', value:fmt(balance), color:balance>=0?'text-brand-600':'text-red-600', bg:balance>=0?'bg-brand-50':'bg-red-50', border:balance>=0?'border-brand-200':'border-red-200', icon:'⚖️' },
              { label:'Por cobrar', value:fmt(totalPending), color:'text-amber-600', bg:'bg-amber-50', border:'border-amber-200', icon:'⏳' },
            ].map((s,i)=>(
              <div key={i} className={`rounded-2xl border p-4 ${s.bg} ${s.border}`}>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-lg">{s.icon}</span>
                  <p className="text-xs text-slate-500 font-medium">{s.label}</p>
                </div>
                <p className={`text-2xl font-display font-bold ${s.color}`}>{s.value}</p>
              </div>
            ))}
          </div>

          {/* Gráfico de barras últimos 6 meses */}
          <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <p className="text-sm font-semibold text-slate-700 mb-4">Ingresos vs Gastos — últimos 6 meses</p>
            <div className="flex items-end gap-3 h-36">
              {last6.map(m=>(
                <div key={m.key} className="flex-1 flex flex-col items-center gap-1">
                  <div className="w-full flex gap-0.5 items-end" style={{height:'100px'}}>
                    <div className="flex-1 rounded-t-md bg-green-400 transition-all" style={{height:`${(m.inc/maxVal)*100}%`, minHeight:m.inc>0?'4px':'0'}} title={`Ingresos: ${fmt(m.inc)}`}/>
                    <div className="flex-1 rounded-t-md bg-red-400 transition-all" style={{height:`${(m.exp/maxVal)*100}%`, minHeight:m.exp>0?'4px':'0'}} title={`Gastos: ${fmt(m.exp)}`}/>
                  </div>
                  <p className="text-xs text-slate-400 font-medium">{m.label}</p>
                </div>
              ))}
            </div>
            <div className="flex gap-4 mt-3 justify-center">
              <span className="flex items-center gap-1.5 text-xs text-slate-500"><span className="w-3 h-3 rounded-sm bg-green-400 inline-block"></span>Ingresos</span>
              <span className="flex items-center gap-1.5 text-xs text-slate-500"><span className="w-3 h-3 rounded-sm bg-red-400 inline-block"></span>Gastos</span>
            </div>
          </div>

          {/* Pacientes con deuda */}
          {debtors.length > 0 && (
            <div className="bg-white rounded-2xl border border-amber-200 p-5 shadow-sm">
              <p className="text-sm font-semibold text-slate-700 mb-3">⚠️ Pacientes con saldo pendiente</p>
              <div className="space-y-2">
                {debtors.map(p=>(
                  <div key={p.id} className="flex items-center justify-between py-2 border-b border-slate-100 last:border-0">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 text-xs font-bold">{p.name.charAt(0)}</div>
                      <span className="text-sm font-medium text-slate-700">{p.name}</span>
                    </div>
                    <span className="text-sm font-bold text-amber-600">{fmt(p.debt)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Gastos por categoría */}
          {monthExpenses.length > 0 && (
            <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
              <p className="text-sm font-semibold text-slate-700 mb-3">Gastos por categoría este mes</p>
              {Object.entries(monthExpenses.reduce((acc,e)=>{acc[e.category]=(acc[e.category]||0)+parseFloat(e.amount||0);return acc},{}))
                .sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(
                <div key={cat} className="flex items-center gap-3 mb-2">
                  <span className="text-xs text-slate-500 w-36 truncate">{cat}</span>
                  <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full bg-red-400 rounded-full" style={{width:`${(amt/totalExpenses)*100}%`}}/>
                  </div>
                  <span className="text-xs font-semibold text-slate-700 w-16 text-right">{fmt(amt)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── COBROS TAB ── */}
      {tab==='cobros' && (
        <div>
          {payments.length===0 ? (
            <div className="bg-white rounded-2xl border border-slate-200 p-14 text-center">
              <span className="text-5xl block mb-3">💰</span>
              <p className="text-slate-500 font-medium">Sin cobros registrados</p>
              <p className="text-slate-400 text-sm mt-1">Presiona "+ Cobro" para registrar un pago</p>
            </div>
          ) : (
            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
              <div className="table-scroll">
              <table className="w-full text-sm" style={{minWidth:'600px'}}>
                <thead className="bg-slate-50 border-b border-slate-200">
                  <tr>{['Paciente','Concepto','Monto','Método','Estado','Fecha',''].map((h,i)=>(
                    <th key={i} className={`px-4 py-3 font-medium text-slate-500 ${i===6?'text-right':'text-left'}`}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {payments.map(p=>(
                    <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                      <td className="px-4 py-3 font-medium text-slate-800">{patientName(p.patient_id)}</td>
                      <td className="px-4 py-3 text-slate-600 text-xs">{p.concept||'—'}</td>
                      <td className="px-4 py-3 font-bold text-green-600">{fmt(p.amount)}</td>
                      <td className="px-4 py-3 text-slate-600 text-xs">{p.method}</td>
                      <td className="px-4 py-3">
                        <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${p.status==='pagado'?'bg-green-100 text-green-700':p.status==='pendiente'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700'}`}>
                          {p.status==='pagado'?'Pagado':p.status==='pendiente'?'Pendiente':'Anulado'}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-slate-500 text-xs">{formatDate(p.payment_date)}</td>
                      <td className="px-4 py-3 text-right space-x-1">
                        <button onClick={()=>openPayment(p)} className="text-brand-500 hover:text-brand-700 text-xs font-medium px-2 py-1 rounded hover:bg-brand-50">Editar</button>
                        <button onClick={()=>deletePayment(p.id)} className="text-red-400 hover:text-red-600 text-xs font-medium px-2 py-1 rounded hover:bg-red-50">✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── GASTOS TAB ── */}
      {tab==='gastos' && (
        <div>
          {expenses.length===0 ? (
            <div className="bg-white rounded-2xl border border-slate-200 p-14 text-center">
              <span className="text-5xl block mb-3">📤</span>
              <p className="text-slate-500 font-medium">Sin gastos registrados</p>
              <p className="text-slate-400 text-sm mt-1">Presiona "+ Gasto" para registrar un egreso</p>
            </div>
          ) : (
            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
              <div className="table-scroll">
              <table className="w-full text-sm" style={{minWidth:'500px'}}>
                <thead className="bg-slate-50 border-b border-slate-200">
                  <tr>{['Categoría','Descripción','Monto','Fecha','Recurrente',''].map((h,i)=>(
                    <th key={i} className={`px-4 py-3 font-medium text-slate-500 ${i===5?'text-right':'text-left'}`}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {expenses.map(e=>(
                    <tr key={e.id} className="hover:bg-slate-50 transition-colors">
                      <td className="px-4 py-3 font-medium text-slate-800">{e.category}</td>
                      <td className="px-4 py-3 text-slate-600 text-xs">{e.description||'—'}</td>
                      <td className="px-4 py-3 font-bold text-red-600">{fmt(e.amount)}</td>
                      <td className="px-4 py-3 text-slate-500 text-xs">{formatDate(e.expense_date)}</td>
                      <td className="px-4 py-3">{e.recurring?<span className="text-xs bg-brand-100 text-brand-700 px-2 py-0.5 rounded-full font-medium">Fijo</span>:<span className="text-xs text-slate-400">—</span>}</td>
                      <td className="px-4 py-3 text-right space-x-1">
                        <button onClick={()=>openExpense(e)} className="text-brand-500 hover:text-brand-700 text-xs font-medium px-2 py-1 rounded hover:bg-brand-50">Editar</button>
                        <button onClick={()=>deleteExpense(e.id)} className="text-red-400 hover:text-red-600 text-xs font-medium px-2 py-1 rounded hover:bg-red-50">✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>
            </div>
          )}
        </div>
      )}
      </>}

      {/* Modal nuevo/editar cobro */}
      {(modal==='new-payment'||modal==='edit-payment') && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 overflow-y-auto">
          <div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl fade-in my-4">
            <div className="flex items-center justify-between mb-5">
              <h3 className="text-lg font-semibold text-slate-800">{modal==='edit-payment'?'Editar cobro':'Registrar cobro'}</h3>
              <button onClick={()=>setModal(null)} className="text-slate-400 hover:text-slate-600">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            {err && <div className="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">{err}</div>}
            <form onSubmit={savePayment} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Paciente *</label>
                <select className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={form.patient_id} onChange={e=>f('patient_id',e.target.value)} required>
                  <option value="">— Seleccionar paciente —</option>
                  {patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Concepto</label>
                <input className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  placeholder="Ej: Sesión terapéutica, Evaluación inicial..." value={form.concept} onChange={e=>f('concept',e.target.value)} />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Monto (USD) *</label>
                  <input type="number" min="0" step="0.01" className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                    placeholder="0.00" value={form.amount} onChange={e=>f('amount',e.target.value)} required />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Método de pago</label>
                  <select className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                    value={form.method} onChange={e=>f('method',e.target.value)}>
                    {PAYMENT_METHODS.map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Estado</label>
                  <select className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                    value={form.status} onChange={e=>f('status',e.target.value)}>
                    <option value="pagado">Pagado</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="anulado">Anulado</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Fecha</label>
                  <input type="date" className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                    value={form.payment_date} onChange={e=>f('payment_date',e.target.value)} />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Notas</label>
                <textarea rows={2} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"
                  placeholder="Observaciones opcionales..." value={form.notes} onChange={e=>f('notes',e.target.value)}/>
              </div>
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={()=>setModal(null)} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
                <button type="submit" disabled={busy} className="px-4 py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white text-sm font-medium disabled:opacity-50">
                  {busy?'Guardando...':modal==='edit-payment'?'Guardar cambios':'Registrar cobro'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Modal nuevo/editar gasto */}
      {(modal==='new-expense'||modal==='edit-expense') && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 overflow-y-auto">
          <div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl fade-in my-4">
            <div className="flex items-center justify-between mb-5">
              <h3 className="text-lg font-semibold text-slate-800">{modal==='edit-expense'?'Editar gasto':'Registrar gasto'}</h3>
              <button onClick={()=>setModal(null)} className="text-slate-400 hover:text-slate-600">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            {err && <div className="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">{err}</div>}
            <form onSubmit={saveExpense} className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Monto (USD) *</label>
                  <input type="number" min="0" step="0.01" className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                    placeholder="0.00" value={expForm.amount} onChange={e=>ef('amount',e.target.value)} required />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Fecha</label>
                  <input type="date" className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                    value={expForm.expense_date} onChange={e=>ef('expense_date',e.target.value)} />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Categoría *</label>
                <select className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  value={expForm.category} onChange={e=>ef('category',e.target.value)} required>
                  <option value="">— Seleccionar categoría —</option>
                  {EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
                <input className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
                  placeholder="Detalle del gasto..." value={expForm.description} onChange={e=>ef('description',e.target.value)} />
              </div>
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={expForm.recurring} onChange={e=>ef('recurring',e.target.checked)} className="w-4 h-4 accent-brand-500"/>
                <span className="text-sm text-slate-700">Gasto fijo / recurrente mensual</span>
              </label>
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={()=>setModal(null)} className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
                <button type="submit" disabled={busy} className="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-medium disabled:opacity-50">
                  {busy?'Guardando...':modal==='edit-expense'?'Guardar cambios':'Registrar gasto'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  )
}

// ── CONSENTIMIENTO INFORMADO ──────────────────────────────
const CONSENT_TEMPLATE = `CONSENTIMIENTO INFORMADO PARA PROCESO PSICOLÓGICO

Psicólogo/a: {PROF_NAME}
{PROF_SPEC}
{PROF_LIC}
Ciudad: {PROF_CITY}
Fecha: {DATE}

Yo, {PATIENT_NAME}, habiendo sido informado/a de manera clara y comprensible sobre el proceso terapéutico que iniciaré, otorgo mi consentimiento libre e informado para participar en el mismo.

INFORMACIÓN SOBRE EL PROCESO TERAPÉUTICO

1. NATURALEZA DEL PROCESO
El proceso psicológico consiste en sesiones de evaluación, orientación y acompañamiento profesional. El/la psicólogo/a utilizará técnicas y procedimientos validados por la comunidad científica, adaptados a mi situación particular. Las sesiones tienen una duración aproximada de 50 minutos.

2. OBJETIVOS
Los objetivos del proceso terapéutico serán definidos de manera conjunta entre el/la profesional y yo, y podrán ser revisados y ajustados a lo largo del proceso.

3. PARTICIPACIÓN VOLUNTARIA
Mi participación en este proceso es completamente voluntaria. Puedo retirar mi consentimiento y dar por terminado el proceso en cualquier momento, sin que ello suponga consecuencia negativa alguna.

4. CONFIDENCIALIDAD
Toda la información compartida durante el proceso terapéutico es estrictamente confidencial. El/la profesional únicamente puede romper esta confidencialidad en los siguientes casos excepcionales:
• Riesgo inminente para la vida del paciente u otras personas.
• Mandato legal o requerimiento judicial.
• Supervisión clínica profesional (manteniendo la anonimización de datos).

5. USO DE HERRAMIENTAS DIGITALES
Autorizo el uso de la plataforma Psicoval para el registro y gestión de mi información clínica. Los datos son tratados con estricta confidencialidad y almacenados de manera segura conforme a la Política de Privacidad de Psicoval (psicoval.app/psicoval_legal.html).

6. INSTRUMENTOS DE EVALUACIÓN
Doy mi consentimiento para la aplicación de instrumentos psicométricos validados que el/la profesional considere pertinentes para la evaluación de mi situación.

7. DERECHOS DEL PACIENTE
- Recibir información clara sobre el proceso, las técnicas y los objetivos.
- Hacer preguntas en cualquier momento del proceso.
- Acceder a la información registrada sobre mi caso.
- Solicitar derivación a otro profesional si lo considero necesario.
- Dar por terminado el proceso en cualquier momento.

8. HONORARIOS Y MODALIDAD
Los honorarios, frecuencia de sesiones y modalidad (presencial/online) han sido acordados previamente con el/la profesional.

DECLARACIÓN DE CONSENTIMIENTO

He leído y comprendido la información anterior. He tenido la oportunidad de hacer preguntas y han sido respondidas satisfactoriamente. Otorgo mi consentimiento libre e informado para participar en el proceso psicológico con el/la profesional indicado/a.

  const [assessments, setAssessments] = useState([])
  const [saving, setSaving]       = useState(false)
  const [showResult, setShowResult] = useState(false)

  useEffect(()=>{
    Promise.all([
      sb.from('patients').select('id,name').eq('user_id',user.id).order('name'),
      sb.from('suicide_risk_assessments').select('*').eq('user_id',user.id).order('created_at',{ascending:false})
    ]).then(([p,a])=>{
      setPatients(p.data||[])
      setAssessments(a.data||[])
      setLoading(false)
    })
  },[user.id])

  const patientName = pid => patients.find(p=>p.id===pid)?.name||'—'
  const formatDate  = d => d ? new Date(d).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'

  const totalScore   = Object.values(scores).reduce((s,v)=>s+(v||0),0)
  const maxScore     = SUICIDE_RISK_QUESTIONS.length * 4
  const allAnswered  = Object.keys(scores).length === SUICIDE_RISK_QUESTIONS.length

  const getRiskLevel = (score) => {
    if (score <= 4)  return SUICIDE_RISK_LEVELS[0]
    if (score <= 9)  return SUICIDE_RISK_LEVELS[1]
    if (score <= 14) return SUICIDE_RISK_LEVELS[2]
    return SUICIDE_RISK_LEVELS[3]
  }

  const riskData = getRiskLevel(totalScore)

  const saveAssessment = async () => {
    if(!selectedPatient || !allAnswered) return
    setSaving(true)
    await sb.from('suicide_risk_assessments').insert({
      user_id:user.id, patient_id:selectedPatient,
      scores:scores, total_score:totalScore,
      risk_level:riskData.level, notes:notes||null
    })
    const {data} = await sb.from('suicide_risk_assessments').select('*').eq('user_id',user.id).order('created_at',{ascending:false})
    setAssessments(data||[])
    setScores({}); setSelectedPatient(''); setNotes(''); setShowResult(false)
    setSaving(false)

    <h1>Evaluación de Riesgo Suicida</h1>

      <p style="font-size:12px;color:#64748b">Puntaje total: ${totalScore}/${maxScore}</p>
      <div class="badge" style="background:${riskData.level==='Bajo'?'#dcfce7':riskData.level==='Moderado'?'#fef3c7':riskData.level==='Alto'?'#ffedd5':'#fee2e2'};color:${riskData.level==='Bajo'?'#166534':riskData.level==='Moderado'?'#92400e':riskData.level==='Alto'?'#9a3412':'#991b1b'}">
        Riesgo ${riskData.level}

    <h2>Evaluación por dimensiones</h2>
    ${SUICIDE_RISK_QUESTIONS.map(q=>{

      <div style="border-top:1px solid #334155;padding-top:8px;min-width:200px;text-align:center;font-size:12px">Fecha</div>
    </div>
    <div class="footer"><p>Documento generado por Psicoval · ${now} · Confidencial — uso clínico exclusivo</p><p>⚠️ Este instrumento es de apoyo clínico. El criterio profesional del evaluador prevalece sobre cualquier puntuación.</p></div>
    </body></html>`
    const w = window.open('','_blank')
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),500)}
  }

  return (
    <div className="p-4 md:p-8 fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-xl md:text-2xl font-display font-semibold text-slate-800">Protocolo de Riesgo Suicida</h2>
          <p className="text-slate-500 text-sm mt-0.5">Evaluación clínica estructurada del riesgo — 6 dimensiones</p>
        </div>
      </div>

      <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex gap-3 mb-6">
        <span className="text-red-500 flex-shrink-0 text-lg">⚠️</span>
        <p className="text-xs text-red-700 leading-relaxed"><strong>Aviso clínico:</strong> Este protocolo es una herramienta de apoyo estructurado. El criterio clínico del profesional evaluador siempre prevalece sobre la puntuación obtenida. En caso de riesgo inminente, actúa de inmediato — no esperes a completar el formulario.</p>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Formulario de evaluación */}
        <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
          <p className="font-semibold text-slate-700 mb-4">Nueva evaluación</p>
          <div className="mb-4">
            <label className="block text-sm font-medium text-slate-700 mb-1">Paciente</label>
            <select className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"
              value={selectedPatient} onChange={e=>{setSelectedPatient(e.target.value);setScores({});setShowResult(false)}}>
              <option value="">— Seleccionar paciente —</option>
              {patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>

          <div className="space-y-4 mb-4">
            {SUICIDE_RISK_QUESTIONS.map(q=>(
              <div key={q.id} className="border border-slate-200 rounded-xl p-3">
                <p className="text-sm font-semibold text-slate-700 mb-2">{q.label}</p>
                <div className="space-y-1.5">
                  {q.options.map(opt=>(
                    <label key={opt.score} className={`flex items-start gap-2 cursor-pointer p-2 rounded-lg transition-colors ${scores[q.id]===opt.score?'bg-brand-50 border border-brand-200':'hover:bg-slate-50'}`}>
                      <input type="radio" name={q.id} value={opt.score} checked={scores[q.id]===opt.score}
                        onChange={()=>{setScores(s=>({...s,[q.id]:opt.score}));setShowResult(false)}}
                        className="mt-0.5 flex-shrink-0 accent-brand-500"/>
                      <span className="text-xs text-slate-600 leading-relaxed">{opt.text}</span>
                    </label>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <div className="mb-4">
            <label className="block text-sm font-medium text-slate-700 mb-1">Notas clínicas (opcional)</label>
            <textarea rows={3} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white resize-none"
              placeholder="Observaciones adicionales del evaluador..." value={notes} onChange={e=>setNotes(e.target.value)} />
          </div>

          <button onClick={()=>setShowResult(true)} disabled={!allAnswered||!selectedPatient}
            className="w-full py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium disabled:opacity-40 transition-colors">
            Ver resultado
          </button>
        </div>

        {/* Resultado */}
        <div className="space-y-4">
          {showResult && allAnswered && (
            <div className={`rounded-2xl border p-5 ${riskData.bg} ${riskData.border}`}>
              <div className="flex items-center justify-between mb-3">
                <p className={`text-lg font-display font-bold ${riskData.color}`}>Riesgo {riskData.level}</p>
                <span className="text-sm font-semibold text-slate-600">{totalScore}/{maxScore} pts</span>
              </div>
              <div className="h-3 bg-white rounded-full overflow-hidden mb-4">
                <div className={`h-full rounded-full transition-all ${totalScore<=4?'bg-green-400':totalScore<=9?'bg-amber-400':totalScore<=14?'bg-orange-400':'bg-red-500'}`}
                  style={{width:`${(totalScore/maxScore)*100}%`}} />
              </div>
              <p className="text-xs font-semibold text-slate-600 mb-2 uppercase tracking-wider">Intervenciones recomendadas</p>
              <ul className="space-y-1.5">
                {(INTERVENTIONS[riskData.level]||[]).map((item,i)=>(
                  <li key={i} className="flex items-start gap-2 text-xs text-slate-700">
                    <span className="text-brand-500 flex-shrink-0 font-bold">→</span>{item}
                  </li>
                ))}
              </ul>
              <div className="flex gap-2 mt-4">
                <button onClick={printAssessment} className="flex-1 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 text-xs font-medium hover:bg-slate-50 flex items-center justify-center gap-1.5">
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                  Imprimir
                </button>
                <button onClick={saveAssessment} disabled={saving} className="flex-1 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-xs font-medium disabled:opacity-50">
                  {saving?'Guardando...':'Guardar evaluación'}
                </button>
              </div>
            </div>
          )}

          {/* Historial */}
          <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <p className="font-semibold text-slate-700 text-sm mb-3">Evaluaciones anteriores</p>
            {loading ? <p className="text-slate-400 text-sm">Cargando...</p>
            : assessments.length===0 ? (
              <p className="text-slate-400 text-sm text-center py-4">Sin evaluaciones registradas</p>
            ) : (
              <div className="space-y-2 max-h-80 overflow-y-auto">
                {assessments.map(a=>{
                  const rd = getRiskLevel(a.total_score)
                  return (
                    <div key={a.id} className={`rounded-xl p-3 border ${rd.bg} ${rd.border}`}>
                      <div className="flex items-center justify-between">
                        <span className="font-semibold text-slate-800 text-sm">{patientName(a.patient_id)}</span>
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${rd.badge}`}>Riesgo {a.risk_level}</span>
                      </div>
                      <p className="text-xs text-slate-500 mt-1">{formatDate(a.created_at)} · {a.total_score}/24 pts</p>
                    </div>
                  )
                })}
              </div>
            )}
          </div>

          {/* Recursos de emergencia */}
          <div className="bg-slate-800 rounded-2xl p-5">
            <p className="text-white font-semibold text-sm mb-3">📞 Recursos de emergencia</p>
            <div className="space-y-2">
              {[
                { label:'ECU-911 (Ecuador)', num:'911' },
                { label:'DINAPEN (niñez/adolescencia)', num:'145' },
                { label:'Bomberos (emergencias)', num:'102' },
              ].map(r=>(
                <div key={r.label} className="flex items-center justify-between">
                  <span className="text-slate-300 text-xs">{r.label}</span>
                  <span className="text-white font-bold text-sm">{r.num}</span>
                </div>
              ))}
            </div>
            <p className="text-slate-400 text-xs mt-3">En riesgo inminente: llama al 911 o acompaña al paciente a urgencias psiquiátricas.</p>
          </div>
        </div>
      </div>
    </div>
  )
}

// ── ADMIN PANEL ───────────────────────────────────────────
function AdminPanel() {
  const [users, setUsers] = useState([])
  const [loading, setLoading] = useState(true)
  const [editUser, setEditUser] = useState(null)
  const [newRole, setNewRole] = useState('')
  const [saving, setSaving] = useState(false)
  const [msg, setMsg] = useState('')
  const [search, setSearch] = useState('')
  const load = useCallback(async () => {
    setLoading(true)
    const { data, error } = await sb.rpc('get_admin_users')
    if (!error) setUsers(data || [])
    else console.error('Admin load error:', error)
    setLoading(false)
  }, [])
  useEffect(()=>{ load() },[load])
  const stats = { total:users.length, premium:users.filter(u=>u.role==='premium').length, basic:users.filter(u=>u.role==='basic').length, free:users.filter(u=>u.role==='free'||!u.role).length, admin:users.filter(u=>u.role==='admin').length, patients:users.reduce((s,u)=>s+(parseInt(u.patient_count)||0),0) }
  const openEdit = u => { setEditUser(u); setNewRole(u.role||'free'); setMsg('') }
  const closeEdit = () => { setEditUser(null); setMsg('') }
  const [duration, setDuration] = useState('1')

  const saveRole = async () => {
    setSaving(true)
    const months = parseInt(duration)
    let expiresAt = null
    if (newRole !== 'free' && newRole !== 'admin' && months > 0) {
      const d = new Date()
      d.setMonth(d.getMonth() + months)
      expiresAt = d.toISOString()
    }
    const payload = { id: editUser.id, role: newRole, expires_at: expiresAt }
    const { error } = await sb.from('profiles').upsert(payload, { onConflict:'id' })
    if (error) setMsg('Error al actualizar.')
    else { setMsg('Plan actualizado ✓'); load(); setTimeout(closeEdit, 1000) }
    setSaving(false)
  }
  const filtered = users.filter(u=>(u.name||'').toLowerCase().includes(search.toLowerCase())||(u.email||'').toLowerCase().includes(search.toLowerCase()))
  const formatDate = d => d ? new Date(d).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) : '—'
  return (
    <div className="p-8 fade-in">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-1">
          <div className="w-8 h-8 rounded-lg bg-yellow-400 flex items-center justify-center">
            <svg className="w-4 h-4 text-yellow-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          </div>
          <h2 className="text-2xl font-display font-semibold text-slate-800">Panel de administración</h2>
        </div>
        <p className="text-slate-500 text-sm">Gestión de usuarios, planes y estadísticas del sistema</p>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <StatCard label="Usuarios totales" value={stats.total} sub="Registrados en el sistema" color="text-brand-600" />
        <StatCard label="Pacientes totales" value={stats.patients} sub="En toda la plataforma" color="text-slate-800" />
        <StatCard label="Plan Premium" value={stats.premium} sub={`${stats.basic} en Básico`} color="text-purple-600" />
        <StatCard label="Plan Gratis" value={stats.free} sub="Potenciales conversiones" color="text-slate-500" />
      </div>
      <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm mb-6">
        <p className="text-sm font-semibold text-slate-700 mb-4">Distribución por plan</p>
        <div className="flex gap-2 h-3 rounded-full overflow-hidden mb-3">
          {stats.total > 0 && <>
            {stats.admin>0&&<div style={{width:`${stats.admin/stats.total*100}%`}} className="bg-yellow-400"/>}
            {stats.premium>0&&<div style={{width:`${stats.premium/stats.total*100}%`}} className="bg-purple-500"/>}
            {stats.basic>0&&<div style={{width:`${stats.basic/stats.total*100}%`}} className="bg-brand-500"/>}
            {stats.free>0&&<div style={{width:`${stats.free/stats.total*100}%`}} className="bg-slate-300"/>}
          </>}
        </div>
        <div className="flex gap-4 text-xs text-slate-500">
          {[['bg-yellow-400','Admin',stats.admin],['bg-purple-500','Premium',stats.premium],['bg-brand-500','Básico',stats.basic],['bg-slate-300','Gratis',stats.free]].map(([c,l,n])=>(
            <span key={l} className="flex items-center gap-1.5"><span className={`w-2.5 h-2.5 rounded-full ${c} inline-block`}></span>{l} ({n})</span>
          ))}
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <p className="font-semibold text-slate-700 text-sm">Usuarios registrados</p>
          <input className="border border-slate-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white w-52 placeholder-slate-400"
            placeholder="Buscar por nombre o email..." value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        {loading ? <div className="text-center py-12 text-slate-400 text-sm">Cargando usuarios...</div> : (
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>{['Usuario','Email','Plan','Pacientes','Registro','Acción'].map((h,i)=>(
                <th key={i} className={`px-5 py-3 font-medium text-slate-500 ${i===5?'text-right':'text-left'}`}>{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {filtered.length===0?<tr><td colSpan={6} className="text-center py-8 text-slate-400 text-sm">No se encontraron usuarios</td></tr>
              :filtered.map(u=>(
                <tr key={u.id} className="hover:bg-slate-50 transition-colors">
                  <td className="px-5 py-3.5"><div className="flex items-center gap-2"><div className="w-7 h-7 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 text-xs font-bold flex-shrink-0">{(u.name||u.email||'?').charAt(0).toUpperCase()}</div><span className="font-medium text-slate-800">{u.name||'Sin nombre'}</span></div></td>
                  <td className="px-5 py-3.5 text-slate-500 text-xs">{u.email}</td>
                  <td className="px-5 py-3.5"><RoleBadge role={u.role||'free'} /></td>
                  <td className="px-5 py-3.5 text-slate-600 text-center">{u.patient_count||0}</td>
                  <td className="px-5 py-3.5 text-slate-400 text-xs">
                    <div>{formatDate(u.created_at)}</div>
                    {u.expires_at && u.role !== 'free' && u.role !== 'admin' && (
                      <div className={`text-xs font-medium mt-0.5 ${new Date(u.expires_at) < new Date() ? 'text-red-500' : new Date(u.expires_at) < new Date(Date.now()+7*86400000) ? 'text-amber-500' : 'text-green-600'}`}>
                        {new Date(u.expires_at) < new Date() ? '🔒 Vencido' : `⏰ Vence ${formatDate(u.expires_at)}`}
                      </div>
                    )}
                  </td>
                  <td className="px-5 py-3.5 text-right"><button onClick={()=>openEdit(u)} className="text-brand-500 hover:text-brand-700 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-brand-50 transition-colors">Cambiar plan</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {editUser && (
        <Modal title="Cambiar plan de usuario" onClose={closeEdit}>
          <div className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-5">
            <div className="w-9 h-9 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold">{(editUser.name||editUser.email).charAt(0).toUpperCase()}</div>
            <div><p className="font-medium text-slate-800 text-sm">{editUser.name||'Sin nombre'}</p><p className="text-slate-400 text-xs">{editUser.email}</p></div>
            <div className="ml-auto"><RoleBadge role={editUser.role||'free'} /></div>
          </div>
          {msg && <Alert msg={msg} type={msg.includes('✓')?'success':'error'} />}
          <div className="space-y-3 mb-6">
            <p className="text-sm font-medium text-slate-700 mb-3">Seleccionar nuevo plan:</p>
            {[{value:'free',label:'Gratis',desc:'Hasta 5 pacientes, sin evaluaciones',color:'bg-slate-100 border-slate-300'},{value:'basic',label:'Básico',desc:'Hasta 30 pacientes, 3 instrumentos',color:'bg-brand-50 border-brand-300'},{value:'premium',label:'Premium',desc:'Ilimitado, todos los instrumentos y reportes PDF',color:'bg-purple-50 border-purple-300'},{value:'admin',label:'Admin',desc:'Acceso total al sistema',color:'bg-yellow-50 border-yellow-300'}].map(opt=>(
              <label key={opt.value} className={`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${newRole===opt.value?opt.color:'border-transparent bg-slate-50 hover:bg-slate-100'}`}>
                <input type="radio" name="role" value={opt.value} checked={newRole===opt.value} onChange={()=>setNewRole(opt.value)} className="mt-0.5 accent-brand-500" />
                <div><p className="text-sm font-semibold text-slate-800">{opt.label}</p><p className="text-xs text-slate-500">{opt.desc}</p></div>
              </label>
            ))}
          </div>
          {newRole !== 'free' && newRole !== 'admin' && (
            <div className="mb-4">
              <p className="text-sm font-medium text-slate-700 mb-2">Duración del plan:</p>
              <div className="grid grid-cols-4 gap-2">
                {[['1','1 mes'],['3','3 meses'],['6','6 meses'],['12','1 año']].map(([val,label])=>(
                  <button key={val} type="button" onClick={()=>setDuration(val)}
                    className={`py-2 rounded-xl text-xs font-semibold border-2 transition-all ${duration===val?'bg-brand-500 text-white border-brand-500':'bg-white text-slate-600 border-slate-200 hover:border-brand-300'}`}>
                    {label}
                  </button>
                ))}
              </div>
              <p className="text-xs text-slate-400 mt-2">
                Vence el: <strong>{(() => { const d = new Date(); d.setMonth(d.getMonth()+parseInt(duration)); return d.toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'}) })()}</strong>
              </p>
            </div>
          )}
          <div className="flex gap-3">
            <button onClick={closeEdit} className="flex-1 px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
            <button onClick={saveRole} disabled={saving} className="flex-1 px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium disabled:opacity-50">{saving?'Guardando...':'Confirmar cambio'}</button>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ── Sidebar ───────────────────────────────────────────────

        {navItem('finanzas','Finanzas',<Icon d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>)}
